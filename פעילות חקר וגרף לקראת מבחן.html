<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>סימולציית קפיץ ואנרגיה | פיזיקאלי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for the Graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #f3f4f6; height: 100vh; display: flex; flex-direction: column; }
        canvas { cursor: crosshair; }
        .panel { background-color: white; border-top: 1px solid #e5e7eb; overflow-y: auto; }
        
        /* Desktop Layout Override */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .panel { width: 24rem; height: 100vh; border-top: none; border-left: 1px solid #e5e7eb; }
        }
        
        .control-group { margin-bottom: 1rem; }
        input[type=range] { width: 100%; cursor: pointer; }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Visualization Column (Simulation + Graph) -->
    <div class="flex-1 flex flex-col h-full relative">
        
        <!-- Simulation Area (Top/Left) -->
        <div class="flex-grow relative bg-gray-100 border-b border-gray-300" style="min-height: 50%;">
            <h1 class="absolute top-2 right-4 text-xl font-bold text-gray-700 pointer-events-none z-10 opacity-70">סימולציית הקפיץ</h1>
            <canvas id="simCanvas" class="w-full h-full block"></canvas>
            <div id="msgBox" class="absolute top-12 bg-white/90 p-2 rounded shadow text-sm font-bold text-blue-600 hidden"></div>
        </div>

        <!-- Graph Area (Bottom/Left) -->
        <div class="h-1/3 bg-white p-2 relative flex flex-col">
            <h3 class="text-xs text-gray-500 font-bold mb-1 mr-2">גרף לינאריזציה: $H$ כתלות ב-$(\Delta x)^2$</h3>
            <div class="flex-1 relative w-full h-full">
                <canvas id="graphCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Controls & Data Panel (Sidebar/Bottom) -->
    <div class="panel p-4 shadow-xl z-20 flex flex-col flex-shrink-0 md:flex-shrink">
        
        <div class="mb-4 border-b pb-2">
            <h2 class="text-lg font-bold text-gray-800 mb-2">לוח בקרה</h2>
            
            <!-- Mass Control -->
            <div class="control-group">
                <label class="block text-xs font-medium text-gray-700 mb-1 flex justify-between">
                    <span>מסת כדור ($m$):</span>
                    <span id="mValueDisplay" class="font-bold text-purple-600">0.20 kg</span> 
                </label>
                <input type="range" id="mSlider" min="0.05" max="0.5" step="0.01" value="0.2" oninput="updateSettings()">
            </div>

            <!-- Spring Constant Control -->
            <div class="control-group">
                <label class="block text-xs font-medium text-gray-700 mb-1 flex justify-between">
                    <span>קבוע קפיץ ($k$):</span>
                    <span id="kValueDisplay" class="font-bold text-blue-600">100 N/m</span>
                </label>
                <input type="range" id="kSlider" min="50" max="200" step="5" value="100" oninput="updateSettings()">
            </div>

            <p class="text-[10px] text-red-500 mb-2 hidden" id="resetWarning">שינוי פרמטרים מאפס טבלה!</p>

            <!-- Compression Control -->
            <div class="control-group">
                <label class="block text-xs font-medium text-gray-700 mb-1 flex justify-between">
                    <span>כיווץ ($\Delta x$):</span>
                    <span id="xValueDisplay" class="font-bold text-green-600">0.15 m</span>
                </label>
                <input type="range" id="xSlider" min="0.05" max="0.40" step="0.01" value="0.15" oninput="updateSettings()">
            </div>

            <div class="flex gap-2 mt-2">
                <button onclick="launchBall()" id="launchBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-sm transition shadow">
                    שגר!
                </button>
                <button onclick="resetSim()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded text-sm">
                    איפוס
                </button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="flex-1 overflow-hidden flex flex-col min-h-[150px]">
            <div class="flex justify-between items-center mb-1">
                <h3 class="font-bold text-gray-700 text-sm">טבלת מדידות</h3>
                <button onclick="clearTable()" class="text-xs text-red-500 hover:text-red-700 underline">נקה</button>
            </div>
            <div class="overflow-y-auto border rounded border-gray-200 flex-1 bg-white">
                <table class="w-full text-xs text-center">
                    <thead class="bg-gray-50 text-gray-600 sticky top-0">
                        <tr>
                            <th class="p-1 border-b">#</th>
                            <th class="p-1 border-b">$\Delta x$ (m)</th>
                            <th class="p-1 border-b">$H$ (m)</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable" class="bg-white">
                        <!-- Data rows will appear here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- Physics Constants ---
        const GRAVITY = 10; 
        
        // --- Global State ---
        let state = {
            m: 0.2,
            k: 100,
            dx: 0.15,
            isAnimating: false,
            ballY: 0, 
            ballV: 0,
            maxHeightReached: 0,
            peakRecorded: false,
            phase: 'idle', 
            pixelsPerMeter: 300, 
            groundY: 0,
            springRestLengthPixels: 150,
            experimentCount: 0
        };

        // --- Canvas Setup ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- Chart Setup (Chart.js) ---
        let resultChart;
        function initChart() {
            const ctxGraph = document.getElementById('graphCanvas').getContext('2d');
            resultChart = new Chart(ctxGraph, {
                data: {
                    datasets: [{
                        type: 'scatter',
                        label: 'תוצאות הניסוי',
                        data: [],
                        backgroundColor: 'rgba(37, 99, 235, 1)', // Tailwind Blue-600
                        borderColor: 'rgba(37, 99, 235, 1)',
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }, {
                        type: 'line',
                        label: 'קו מגמה',
                        data: [],
                        borderColor: 'rgba(239, 68, 68, 0.8)', // Tailwind Red-500
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            title: { display: true, text: 'ריבוע הכיווץ (דלתא x בריבוע) [m^2]' },
                            min: 0
                        },
                        y: {
                            title: { display: true, text: 'גובה מקסימלי H [m]' },
                            min: 0
                        }
                    },
                    plugins: {
                        legend: { display: true, labels: { boxWidth: 10, usePointStyle: true } }
                    }
                }
            });
        }

        // --- Trendline Calculation ---
        function updateTrendline() {
            const dataPoints = resultChart.data.datasets[0].data;
            
            // Only draw trendline if more than 2 points exist
            if (dataPoints.length <= 2) {
                resultChart.data.datasets[1].data = [];
                return;
            }

            // Simple Linear Regression (Least Squares)
            let n = dataPoints.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

            for (let i = 0; i < n; i++) {
                const x = dataPoints[i].x;
                const y = dataPoints[i].y;
                sumX += x;
                sumY += y;
                sumXY += x * y;
                sumXX += x * x;
            }

            const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;

            // Generate start and end points for the line
            // Start from X=0 (physically logical) or min X in dataset
            const minX = 0; 
            const maxX = dataPoints[dataPoints.length - 1].x; // Assumes sorted data

            resultChart.data.datasets[1].data = [
                { x: minX, y: intercept + slope * minX },
                { x: maxX, y: intercept + slope * maxX }
            ];
        }

        // --- Core Functions ---

        function resize() {
            // Sim Canvas
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            // Adjust scale based on screen height for better visibility on mobile
            if (canvas.height < 400) {
                state.pixelsPerMeter = 200; 
                state.springRestLengthPixels = 100;
            } else {
                state.pixelsPerMeter = 300;
                state.springRestLengthPixels = 150;
            }
            
            state.groundY = canvas.height - 30;
            draw();
        }
        window.addEventListener('resize', resize);

        function init() {
            initChart();
            resize();
            updateSettings(); 
            draw();
        }

        function updateSettings() {
            if (state.isAnimating) return; 
            
            const newM = parseFloat(document.getElementById('mSlider').value);
            const newK = parseInt(document.getElementById('kSlider').value);
            const newDx = parseFloat(document.getElementById('xSlider').value);
            
            let experimentParamsChanged = false;
            if (newK !== state.k || newM !== state.m) {
                experimentParamsChanged = true;
                state.k = newK;
                state.m = newM;
                document.getElementById('kValueDisplay').innerText = state.k + ' N/m';
                document.getElementById('mValueDisplay').innerText = state.m.toFixed(2) + ' kg';
                clearTable(); 
            }

            const warning = document.getElementById('resetWarning');
            if (warning) {
                warning.style.display = experimentParamsChanged ? 'block' : 'none';
                if(experimentParamsChanged) setTimeout(() => { warning.style.display = 'none'; }, 2000);
            }

            state.dx = newDx;
            document.getElementById('xValueDisplay').innerText = state.dx.toFixed(2) + ' m';
            
            state.phase = 'idle';
            state.peakRecorded = false;
            state.ballY = -state.dx * state.pixelsPerMeter; 
            
            draw();
        }

        function resetSim() {
            state.isAnimating = false;
            state.peakRecorded = false;
            state.phase = 'idle';
            state.ballY = -state.dx * state.pixelsPerMeter;
            draw();
        }

        function clearTable() {
            document.getElementById('resultsTable').innerHTML = '';
            state.experimentCount = 0;
            // Clear Chart
            resultChart.data.datasets[0].data = [];
            resultChart.data.datasets[1].data = []; // Clear trendline
            resultChart.update();
        }

        function launchBall() {
            if (state.isAnimating) return;
            
            state.isAnimating = true;
            state.peakRecorded = false;
            state.phase = 'moving';
            state.ballV = 0; 
            
            const dt = 0.016; 
            const startY = -state.dx * state.pixelsPerMeter;
            
            function loop() {
                if (!state.isAnimating) return;
                
                let currentPosMeters = state.ballY / state.pixelsPerMeter;
                
                let gravity = -state.m * GRAVITY;
                let springF = 0;
                
                if (currentPosMeters < 0) {
                    springF = -state.k * currentPosMeters;
                }
                
                let a = (springF + gravity) / state.m;
                
                state.ballV += a * dt;
                let dy = state.ballV * dt * state.pixelsPerMeter;
                state.ballY += dy;
                
                // Peak Detection
                if (state.ballV < 0 && !state.peakRecorded && state.ballY > startY) {
                    state.peakRecorded = true;
                    const theoreticalH = (state.k * Math.pow(state.dx, 2)) / (2 * state.m * GRAVITY);
                    state.maxHeightReached = theoreticalH; 
                    addResult(state.dx, state.maxHeightReached);
                }
                
                // Stop at bottom
                if (state.ballY <= startY && state.ballV < 0) {
                     state.ballY = startY;
                     state.isAnimating = false;
                     state.phase = 'idle';
                     draw();
                     return;
                }

                draw();
                requestAnimationFrame(loop);
            }
            
            requestAnimationFrame(loop);
        }

        function addResult(dx, h) {
            state.experimentCount++;
            
            // 1. Add to Table
            const tbody = document.getElementById('resultsTable');
            const row = document.createElement('tr');
            row.className = "hover:bg-blue-50 transition";
            row.innerHTML = `
                <td class="p-1 border-b font-bold text-gray-500">${state.experimentCount}</td>
                <td class="p-1 border-b dir-ltr">${dx.toFixed(2)}</td>
                <td class="p-1 border-b font-bold text-blue-700 dir-ltr">${h.toFixed(3)}</td>
            `;
            tbody.insertBefore(row, tbody.firstChild);

            // 2. Add to Graph (Linearized: X = dx^2, Y = h)
            const dxSquared = dx * dx;
            resultChart.data.datasets[0].data.push({ x: dxSquared, y: h });
            
            // Sort data so line/points make sense if user does experiments out of order
            resultChart.data.datasets[0].data.sort((a, b) => a.x - b.x);
            
            // 3. Update Trendline
            updateTrendline();
            
            resultChart.update();
        }

        // --- Drawing Logic ---

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const groundY = state.groundY;
            const releaseLevelY = groundY - state.springRestLengthPixels; 
            
            drawRuler(centerX - 80, releaseLevelY);

            // Reference Lines
            ctx.beginPath();
            ctx.strokeStyle = "#ccc";
            ctx.setLineDash([5, 5]);
            ctx.moveTo(centerX - 100, releaseLevelY);
            ctx.lineTo(centerX + 100, releaseLevelY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = "#999";
            ctx.font = "12px Rubik";
            ctx.fillText("0", centerX + 110, releaseLevelY + 4);

            const compressionY = releaseLevelY + (state.dx * state.pixelsPerMeter);
            ctx.beginPath();
            ctx.strokeStyle = "#10b981"; 
            ctx.setLineDash([2, 2]);
            ctx.moveTo(centerX - 100, compressionY);
            ctx.lineTo(centerX + 100, compressionY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            if (!state.isAnimating && Math.abs(state.ballY - (-state.dx * state.pixelsPerMeter)) < 1) {
                ctx.fillStyle = "#059669";
                ctx.fillText("התחלה", centerX + 110, compressionY + 4);
            }

            const ballVisualY = releaseLevelY - state.ballY;
            const ballRadius = 15; // Slightly smaller for mobile
            
            // Draw Spring
            let springVisualTop;
            if (state.ballY > 0) {
                springVisualTop = releaseLevelY + ballRadius; 
            } else {
                springVisualTop = ballVisualY + ballRadius; 
            }
            drawSpring(centerX, groundY, springVisualTop, 20);

            // Draw Ball
            ctx.beginPath();
            ctx.arc(centerX, ballVisualY, ballRadius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(centerX - 5, ballVisualY - 5, 2, centerX, ballVisualY, ballRadius);
            grad.addColorStop(0, "#60a5fa");
            grad.addColorStop(1, "#2563eb");
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = "#1e40af";
            ctx.stroke();

            // Draw Peak Marker
            if (state.peakRecorded) {
                const peakYFromRelease = state.maxHeightReached - state.dx;
                const peakVisualY = releaseLevelY - (peakYFromRelease * state.pixelsPerMeter);

                ctx.beginPath();
                ctx.strokeStyle = "rgba(255, 0, 0, 0.6)";
                ctx.lineWidth = 2;
                ctx.moveTo(centerX - 60, peakVisualY);
                ctx.lineTo(centerX + 60, peakVisualY);
                ctx.stroke();
                
                ctx.fillStyle = "rgba(220, 0, 0, 0.8)";
                ctx.font = "bold 12px Rubik";
                ctx.fillText(`${state.maxHeightReached.toFixed(3)}m`, centerX + 70, peakVisualY + 5);
            }
        }

        function drawSpring(x, bottomY, topY, width) {
            ctx.beginPath();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 3;
            ctx.lineJoin = "round";
            
            const height = bottomY - topY;
            const coils = 10;
            const coilHeight = height / coils;
            
            ctx.moveTo(x, bottomY);
            for (let i = 0; i < coils; i++) {
                const cy = bottomY - (i * coilHeight);
                ctx.lineTo(x - width, cy - coilHeight * 0.25);
                ctx.lineTo(x + width, cy - coilHeight * 0.75);
                ctx.lineTo(x, cy - coilHeight);
            }
            ctx.stroke();
            
            // Base
            ctx.beginPath();
            ctx.moveTo(x - 20, bottomY);
            ctx.lineTo(x + 20, bottomY);
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#000";
            ctx.stroke();
        }

        function drawRuler(x, zeroY) {
            ctx.fillStyle = "#666";
            ctx.strokeStyle = "#666";
            ctx.lineWidth = 1;
            ctx.font = "10px sans-serif";
            
            ctx.beginPath();
            ctx.moveTo(x, zeroY + 600); // Extended range
            ctx.lineTo(x, zeroY - 600);
            ctx.stroke();
            
            for (let m = -1.0; m <= 2.0; m += 0.1) {
                const val = Math.round(m * 10) / 10;
                const y = zeroY - (val * state.pixelsPerMeter);
                if (y > state.groundY) continue;
                if (y < 0) continue; // Optimization
                
                const tickLen = (Math.abs(val % 0.5) < 0.01) ? 12 : 6; 
                
                ctx.beginPath();
                ctx.moveTo(x - tickLen, y);
                ctx.lineTo(x, y);
                ctx.stroke();
                
                if (Math.abs(val % 0.5) < 0.01) {
                    ctx.fillText(val.toFixed(1), x - 30, y + 3);
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
