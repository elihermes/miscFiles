<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סייר קבצים - miscFiles</title>
    <style>
        :root {
            --bg-top: #f0f9ff;
            --bg-bottom: #eef2ff;
            --ink: #0f172a;
            --muted: #475569;
            --line: #cbd5e1;
            --panel: #ffffff;
            --chip: #e2e8f0;
            --chip-active: #0f766e;
            --chip-active-ink: #ecfeff;
            --folder: #0ea5e9;
            --file: #64748b;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Rubik", "Segoe UI", Tahoma, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 8%, rgba(14, 165, 233, 0.14), transparent 26%),
                radial-gradient(circle at 88% 92%, rgba(99, 102, 241, 0.14), transparent 28%),
                linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            min-height: 100vh;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 1rem 1rem 2rem;
        }

        .hero {
            text-align: center;
            padding: 1.2rem 0 0.8rem;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(1.9rem, 4vw, 3rem);
        }

        .hero p {
            margin: 0.6rem 0 0;
            color: var(--muted);
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 1rem;
            margin-top: 1rem;
        }

        .topbar {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .searchbar {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-options {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .search-options input {
            accent-color: #0ea5e9;
        }

        .search-input {
            flex: 1 1 280px;
            min-width: 220px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
            border-radius: 10px;
            padding: 0.5rem 0.7rem;
            font: inherit;
        }

        .search-input:focus {
            outline: 2px solid rgba(14, 165, 233, 0.25);
            outline-offset: 1px;
            border-color: #7dd3fc;
        }

        .btn {
            border: 1px solid var(--line);
            background: #fff;
            color: #1e293b;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            padding: 0.45rem 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .btn:hover {
            background: #f8fafc;
        }

        .status {
            margin-top: 0.8rem;
            color: var(--muted);
            min-height: 1.4rem;
        }

        .crumbs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 0.7rem 0 0;
            padding: 0;
            list-style: none;
        }

        .crumbs a,
        .crumbs span {
            display: inline-block;
            border-radius: 999px;
            padding: 0.25rem 0.6rem;
            font-size: 0.92rem;
            background: var(--chip);
            color: #1e293b;
            text-decoration: none;
        }

        .crumbs .active {
            background: var(--chip-active);
            color: var(--chip-active-ink);
        }

        .list {
            margin-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 0.1rem;
            border-bottom: 1px solid #f1f5f9;
            text-decoration: none;
            color: inherit;
        }

        .row:hover {
            background: #f8fafc;
        }

        .icon {
            width: 1.2rem;
            text-align: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .icon.folder { color: var(--folder); }
        .icon.file { color: var(--file); }

        .name {
            font-weight: 500;
            overflow-wrap: anywhere;
        }

        .meta {
            margin-inline-start: auto;
            font-size: 0.85rem;
            color: var(--muted);
            padding-inline-start: 0.7rem;
            flex-shrink: 0;
        }

        .empty {
            color: var(--muted);
            padding: 1rem 0.2rem 0.2rem;
        }

        .search-item {
            border-bottom: 1px solid #f1f5f9;
        }

        .search-item .row {
            border-bottom: 0;
            padding-bottom: 0.35rem;
        }

        .search-details {
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.45;
            padding: 0 1.9rem 0.55rem 0.1rem;
            overflow-wrap: anywhere;
        }

        .search-details strong {
            color: #334155;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .meta {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1>סייר קבצים</h1>
            <p>ניווט בכל הקבצים והתיקיות של המאגר כפי שהם ב־GitHub Pages</p>
        </header>

        <section class="panel" aria-label="File explorer">
            <div class="topbar">
                <div>
                    <a class="btn" href="./">שורש המאגר</a>
                    <a class="btn" href="./webfiles/altIndex.html">דף הבית</a>
                </div>
                <button id="refreshBtn" class="btn" type="button">רענון</button>
            </div>

            <div class="searchbar" aria-label="חיפוש קבצים">
                <input id="searchInput" class="search-input" type="search" placeholder="חיפוש לפי שם קובץ או תיקייה..." autocomplete="off">
                <button id="clearSearchBtn" class="btn" type="button">נקה חיפוש</button>
                <label class="search-options" for="contentSearchToggle">
                    <input id="contentSearchToggle" type="checkbox">
                    <span>חיפוש גם בתוך תוכן הקבצים (כולל HTML)</span>
                </label>
            </div>

            <p id="status" class="status">טוען נתונים...</p>
            <ul id="breadcrumbs" class="crumbs"></ul>
            <div id="list" class="list"></div>
        </section>
    </main>

    <script>
        const statusEl = document.getElementById('status');
        const breadcrumbsEl = document.getElementById('breadcrumbs');
        const listEl = document.getElementById('list');
        const refreshBtn = document.getElementById('refreshBtn');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const contentSearchToggle = document.getElementById('contentSearchToggle');

        const DEFAULT_OWNER = 'elihermes';
        const DEFAULT_REPO = 'miscFiles';
        const MAX_CONTENT_FILES_TO_SCAN = 220;
        const MAX_CONTENT_FILE_SIZE = 350000;
        const CONTENT_SEARCH_CONCURRENCY = 8;
        const SEARCHABLE_EXTENSIONS = new Set([
            'html', 'htm', 'txt', 'md', 'csv', 'json', 'js', 'css', 'xml',
            'py', 'sh', 'ps1', 'cmd', 'yml', 'yaml', 'ts', 'tsx', 'jsx'
        ]);
        let activeLoadToken = 0;

        function encodePathForHref(path) {
            if (!path) {
                return './';
            }
            return './' + path.split('/').map(encodeURIComponent).join('/');
        }

        function getRepoContext() {
            const hostMatch = window.location.hostname.match(/^([^.]+)\.github\.io$/);
            const pathParts = window.location.pathname.split('/').filter(Boolean);

            if (hostMatch && pathParts.length > 0) {
                return {
                    owner: hostMatch[1],
                    repo: pathParts[0]
                };
            }

            return {
                owner: DEFAULT_OWNER,
                repo: DEFAULT_REPO
            };
        }

        function getCurrentPath() {
            const p = new URLSearchParams(window.location.search).get('path') || '';
            return p.replace(/^\/+|\/+$/g, '');
        }

        function getSearchQuery() {
            return (new URLSearchParams(window.location.search).get('q') || '').trim();
        }

        function getSearchInContent() {
            const raw = new URLSearchParams(window.location.search).get('content');
            return raw === null ? true : raw === '1';
        }

        function folderHref(path) {
            if (!path) {
                return './';
            }
            return './?path=' + encodeURIComponent(path);
        }

        function isLocalhost() {
            return window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        }

        async function fetchTree() {
            if (isLocalhost()) {
                try {
                    const localResponse = await fetch('./api/local-tree', { cache: 'no-store' });
                    if (localResponse.ok) {
                        const localData = await localResponse.json();
                        return {
                            tree: Array.isArray(localData.tree) ? localData.tree : [],
                            source: 'local'
                        };
                    }
                } catch (_err) {
                    // Fall back to GitHub API below if local endpoint is unavailable.
                }
            }

            const ctx = getRepoContext();
            const treeUrl = `https://api.github.com/repos/${ctx.owner}/${ctx.repo}/git/trees/HEAD?recursive=1`;
            const response = await fetch(treeUrl, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error('api-failed');
            }

            const data = await response.json();
            return {
                tree: Array.isArray(data.tree) ? data.tree : [],
                source: 'github'
            };
        }

        function makeBreadcrumbs(currentPath) {
            breadcrumbsEl.innerHTML = '';
            const rootLi = document.createElement('li');
            if (!currentPath) {
                const rootSpan = document.createElement('span');
                rootSpan.textContent = 'שורש';
                rootSpan.className = 'active';
                rootLi.appendChild(rootSpan);
            } else {
                const rootA = document.createElement('a');
                rootA.href = folderHref('');
                rootA.textContent = 'שורש';
                rootLi.appendChild(rootA);
            }
            breadcrumbsEl.appendChild(rootLi);

            if (!currentPath) {
                return;
            }

            const parts = currentPath.split('/').filter(Boolean);
            let acc = '';
            for (let i = 0; i < parts.length; i += 1) {
                acc = acc ? acc + '/' + parts[i] : parts[i];
                const li = document.createElement('li');
                if (i === parts.length - 1) {
                    const span = document.createElement('span');
                    span.textContent = parts[i];
                    span.className = 'active';
                    li.appendChild(span);
                } else {
                    const a = document.createElement('a');
                    a.href = folderHref(acc);
                    a.textContent = parts[i];
                    li.appendChild(a);
                }
                breadcrumbsEl.appendChild(li);
            }
        }

        function getImmediateChildren(tree, currentPath) {
            const prefix = currentPath ? currentPath + '/' : '';
            const dirMap = new Map();
            const fileMap = new Map();

            for (const node of tree) {
                if (!node || typeof node.path !== 'string') {
                    continue;
                }
                if (!node.path.startsWith(prefix)) {
                    continue;
                }

                const rest = node.path.slice(prefix.length);
                if (!rest) {
                    continue;
                }

                const slashIndex = rest.indexOf('/');
                if (slashIndex === -1) {
                    if (node.type === 'blob') {
                        fileMap.set(rest, { name: rest, path: node.path, type: 'file' });
                    }
                } else {
                    const dirName = rest.slice(0, slashIndex);
                    if (!dirMap.has(dirName)) {
                        const fullPath = prefix + dirName;
                        dirMap.set(dirName, { name: dirName, path: fullPath, type: 'dir' });
                    }
                }
            }

            const collator = new Intl.Collator('he', { numeric: true, sensitivity: 'base' });
            const dirs = Array.from(dirMap.values()).sort((a, b) => collator.compare(a.name, b.name));
            const files = Array.from(fileMap.values()).sort((a, b) => collator.compare(a.name, b.name));
            return { dirs, files };
        }

        function getSearchMatches(tree, query) {
            const q = query.trim().toLocaleLowerCase('he');
            if (!q) {
                return { dirs: [], files: [] };
            }

            const dirMap = new Map();
            const fileMap = new Map();

            for (const node of tree) {
                if (!node || typeof node.path !== 'string' || !node.path) {
                    continue;
                }

                const parts = node.path.split('/').filter(Boolean);
                const name = parts[parts.length - 1] || '';
                if (!name) {
                    continue;
                }

                if (!name.toLocaleLowerCase('he').includes(q)) {
                    continue;
                }

                if (node.type === 'blob') {
                    fileMap.set(node.path, { name, path: node.path, type: 'file' });
                } else if (node.type === 'tree') {
                    dirMap.set(node.path, { name, path: node.path, type: 'dir' });
                }
            }

            const collator = new Intl.Collator('he', { numeric: true, sensitivity: 'base' });
            const dirs = Array.from(dirMap.values()).sort((a, b) => collator.compare(a.path, b.path));
            const files = Array.from(fileMap.values()).sort((a, b) => collator.compare(a.path, b.path));
            return { dirs, files };
        }

        function fileExtension(path) {
            const dot = path.lastIndexOf('.');
            if (dot === -1) {
                return '';
            }
            return path.slice(dot + 1).toLocaleLowerCase('en');
        }

        function isSearchableContentFile(node) {
            if (!node || node.type !== 'blob' || typeof node.path !== 'string') {
                return false;
            }
            if (typeof node.size === 'number' && node.size > MAX_CONTENT_FILE_SIZE) {
                return false;
            }
            const ext = fileExtension(node.path);
            return SEARCHABLE_EXTENSIONS.has(ext);
        }

        function makeSnippet(content, q) {
            const idx = content.toLocaleLowerCase('he').indexOf(q);
            if (idx === -1) {
                return '';
            }

            const snippetStart = Math.max(0, idx - 45);
            const snippetEnd = Math.min(content.length, idx + q.length + 45);
            const rawSnippet = content.slice(snippetStart, snippetEnd).replace(/\s+/g, ' ').trim();
            return rawSnippet.length > 95 ? rawSnippet.slice(0, 95) + '...' : rawSnippet;
        }

        async function searchInFileContents(tree, query, loadToken) {
            const q = query.trim().toLocaleLowerCase('he');
            if (!q) {
                return { contentFiles: [], scannedCount: 0 };
            }

            const candidates = tree
                .filter(isSearchableContentFile)
                .slice(0, MAX_CONTENT_FILES_TO_SCAN);

            const matches = [];
            let scannedCount = 0;
            let cursor = 0;

            async function worker() {
                while (cursor < candidates.length) {
                    if (loadToken !== activeLoadToken) {
                        return;
                    }

                    const i = cursor;
                    cursor += 1;
                    const node = candidates[i];
                    if (!node) {
                        continue;
                    }

                    try {
                        const response = await fetch(encodePathForHref(node.path), { cache: 'no-store' });
                        if (!response.ok) {
                            continue;
                        }

                        const text = await response.text();
                        scannedCount += 1;

                        if (text.toLocaleLowerCase('he').includes(q)) {
                            const parts = node.path.split('/').filter(Boolean);
                            matches.push({
                                name: parts[parts.length - 1] || node.path,
                                path: node.path,
                                type: 'file',
                                snippet: makeSnippet(text, q)
                            });
                        }
                    } catch (_err) {
                        // Ignore unreadable files and keep searching.
                    }
                }
            }

            const workers = [];
            const workerCount = Math.min(CONTENT_SEARCH_CONCURRENCY, candidates.length);
            for (let i = 0; i < workerCount; i += 1) {
                workers.push(worker());
            }
            await Promise.all(workers);

            const collator = new Intl.Collator('he', { numeric: true, sensitivity: 'base' });
            matches.sort((a, b) => collator.compare(a.path, b.path));

            return {
                contentFiles: matches,
                scannedCount
            };
        }

        function renderRows(currentPath, dirs, files) {
            listEl.innerHTML = '';

            const parentPath = currentPath.includes('/')
                ? currentPath.slice(0, currentPath.lastIndexOf('/'))
                : '';

            if (currentPath) {
                const parentRow = document.createElement('a');
                parentRow.href = folderHref(parentPath);
                parentRow.className = 'row';
                parentRow.innerHTML = '<span class="icon folder">..</span><span class="name">תיקיית אב</span><span class="meta">ניווט</span>';
                listEl.appendChild(parentRow);
            }

            for (const dir of dirs) {
                const a = document.createElement('a');
                a.href = folderHref(dir.path);
                a.className = 'row';

                const icon = document.createElement('span');
                icon.className = 'icon folder';
                icon.textContent = 'ת';

                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = dir.name;

                const meta = document.createElement('span');
                meta.className = 'meta';
                meta.textContent = 'תיקייה';

                a.append(icon, name, meta);
                listEl.appendChild(a);
            }

            for (const file of files) {
                const a = document.createElement('a');
                a.href = encodePathForHref(file.path);
                a.className = 'row';

                const icon = document.createElement('span');
                icon.className = 'icon file';
                icon.textContent = 'ק';

                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = file.name;

                const meta = document.createElement('span');
                meta.className = 'meta';
                meta.textContent = 'קובץ';

                a.append(icon, name, meta);
                listEl.appendChild(a);
            }

            if (!dirs.length && !files.length) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = 'התיקייה ריקה או שלא נמצאו פריטים בנתיב זה.';
                listEl.appendChild(empty);
            }
        }

        function renderSearchRows(dirs, files) {
            listEl.innerHTML = '';

            for (const dir of dirs) {
                const item = document.createElement('div');
                item.className = 'search-item';

                const a = document.createElement('a');
                a.href = folderHref(dir.path);
                a.className = 'row';

                const icon = document.createElement('span');
                icon.className = 'icon folder';
                icon.textContent = 'ת';

                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = dir.name;

                const meta = document.createElement('span');
                meta.className = 'meta';
                meta.textContent = 'תיקייה';

                a.append(icon, name, meta);
                item.appendChild(a);

                const details = document.createElement('div');
                details.className = 'search-details';
                const pathLabel = document.createElement('strong');
                pathLabel.textContent = 'נתיב: ';
                const pathValue = document.createElement('span');
                pathValue.textContent = dir.path;
                details.append(pathLabel, pathValue);
                item.appendChild(details);

                listEl.appendChild(item);
            }

            for (const file of files) {
                const item = document.createElement('div');
                item.className = 'search-item';

                const a = document.createElement('a');
                a.href = encodePathForHref(file.path);
                a.className = 'row';

                const icon = document.createElement('span');
                icon.className = 'icon file';
                icon.textContent = 'ק';

                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = file.name;

                const meta = document.createElement('span');
                meta.className = 'meta';
                meta.textContent = file.snippet ? 'תוכן תואם' : 'קובץ';

                a.append(icon, name, meta);
                item.appendChild(a);

                const details = document.createElement('div');
                details.className = 'search-details';

                const pathLabel = document.createElement('strong');
                pathLabel.textContent = 'נתיב: ';
                const pathValue = document.createElement('span');
                pathValue.textContent = file.path;
                details.append(pathLabel, pathValue);

                if (file.snippet) {
                    const br = document.createElement('br');
                    const snippetLabel = document.createElement('strong');
                    snippetLabel.textContent = 'תוכן: ';
                    const snippetValue = document.createElement('span');
                    snippetValue.textContent = file.snippet;
                    details.append(br, snippetLabel, snippetValue);
                }
                item.appendChild(details);

                listEl.appendChild(item);
            }

            if (!dirs.length && !files.length) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = 'לא נמצאו תוצאות חיפוש.';
                listEl.appendChild(empty);
            }
        }

        function updateSearchInUrl(rawValue) {
            const value = rawValue.trim();
            const url = new URL(window.location.href);
            if (value) {
                url.searchParams.set('q', value);
            } else {
                url.searchParams.delete('q');
            }
            history.replaceState(null, '', url);
        }

        function updateContentSearchInUrl(enabled) {
            const url = new URL(window.location.href);
            url.searchParams.set('content', enabled ? '1' : '0');
            history.replaceState(null, '', url);
        }

        let searchDebounceTimer;
        function triggerSearchWithDebounce() {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                updateSearchInUrl(searchInput.value);
                loadAndRender();
            }, 220);
        }

        async function loadAndRender() {
            const loadToken = ++activeLoadToken;
            const currentPath = getCurrentPath();
            const searchQuery = getSearchQuery();
            const includeContent = getSearchInContent();
            makeBreadcrumbs(currentPath);
            statusEl.textContent = 'טוען נתונים...';

            if (searchInput && searchInput.value !== searchQuery) {
                searchInput.value = searchQuery;
            }

            if (contentSearchToggle) {
                contentSearchToggle.checked = includeContent;
            }

            try {
                const { tree, source } = await fetchTree();
                if (loadToken !== activeLoadToken) {
                    return;
                }

                let dirs;
                let files;
                let scannedCount = 0;

                if (searchQuery) {
                    ({ dirs, files } = getSearchMatches(tree, searchQuery));
                    if (includeContent) {
                        const contentResult = await searchInFileContents(tree, searchQuery, loadToken);
                        if (loadToken !== activeLoadToken) {
                            return;
                        }

                        scannedCount = contentResult.scannedCount;
                        const byPath = new Map(files.map((f) => [f.path, f]));
                        for (const file of contentResult.contentFiles) {
                            if (!byPath.has(file.path)) {
                                byPath.set(file.path, file);
                            } else if (file.snippet) {
                                byPath.get(file.path).snippet = file.snippet;
                            }
                        }
                        files = Array.from(byPath.values());
                        const collator = new Intl.Collator('he', { numeric: true, sensitivity: 'base' });
                        files.sort((a, b) => collator.compare(a.path, b.path));
                    }

                    renderSearchRows(dirs, files);
                } else {
                    ({ dirs, files } = getImmediateChildren(tree, currentPath));
                    renderRows(currentPath, dirs, files);
                }

                const sourceLabel = source === 'local' ? 'מקומי' : 'GitHub';
                if (searchQuery) {
                    if (includeContent) {
                        statusEl.textContent = `חיפוש "${searchQuery}": נמצאו ${dirs.length} תיקיות ו-${files.length} קבצים (שם + תוכן). נסרקו ${scannedCount} קבצים. מקור: ${sourceLabel}.`;
                    } else {
                        statusEl.textContent = `חיפוש "${searchQuery}": נמצאו ${dirs.length} תיקיות ו-${files.length} קבצים (שם בלבד). מקור: ${sourceLabel}.`;
                    }
                } else {
                    statusEl.textContent = `מוצגות ${dirs.length} תיקיות ו-${files.length} קבצים. מקור: ${sourceLabel}.`;
                }
            } catch (_err) {
                listEl.innerHTML = '';
                statusEl.textContent = 'לא ניתן לטעון כרגע את רשימת הקבצים. נסי שוב בעוד רגע.';
            }
        }

        searchInput.addEventListener('input', triggerSearchWithDebounce);

        contentSearchToggle.addEventListener('change', () => {
            updateContentSearchInUrl(contentSearchToggle.checked);
            loadAndRender();
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            updateSearchInUrl('');
            loadAndRender();
            searchInput.focus();
        });

        refreshBtn.addEventListener('click', loadAndRender);
        loadAndRender();
    </script>
</body>
</html>
