<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדגמות רייסמן - בחירת תחום</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ink: #0f172a;
            --muted: #475569;
        }

        body {
            margin: 0;
            font-family: "Rubik", "Segoe UI", Tahoma, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 8%, rgba(14, 165, 233, 0.16), transparent 28%),
                radial-gradient(circle at 90% 88%, rgba(16, 185, 129, 0.16), transparent 30%),
                linear-gradient(120deg, #f8fafc, #eef2ff 50%, #f0fdfa);
            min-height: 100vh;
        }

        .choice-card {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .choice-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
        }

        .choice-link {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 1.1rem;
        }

        .tag {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
        }
    </style>
</head>
<body>
    <main class="max-w-3xl mx-auto px-4 py-10 md:py-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-5xl font-bold text-slate-900">הדגמות רייסמן</h1>
            <p class="mt-3 text-slate-600 text-base md:text-lg">בחרי/בחר מסלול כניסה</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5" aria-label="בחירת תחום">
            <article class="choice-card">
                <a class="choice-link" href="./הדגות חשמל.html">
                    <span class="tag bg-teal-100 text-teal-800">חשמל</span>
                    <h2 class="text-xl font-bold mt-3">מאגר הדגמות חשמל</h2>
                    <p class="text-slate-600 mt-2">כניסה לעמוד סרטוני ההדגמות בחשמל.</p>
                </a>
            </article>

            <article class="choice-card">
                <a class="choice-link" href="./מכניקה/video-gallery-template.html">
                    <span class="tag bg-indigo-100 text-indigo-800">מכניקה</span>
                    <h2 class="text-xl font-bold mt-3">מאגר הדגמות מכניקה</h2>
                    <p class="text-slate-600 mt-2">כניסה לעמוד סרטוני ההדגמות במכניקה.</p>
                </a>
            </article>

            <article class="choice-card">
                <a class="choice-link" href="./ניהול סרטונים/videos-admin.html">
                    <span class="tag bg-amber-100 text-amber-800">ניהול</span>
                    <h2 class="text-xl font-bold mt-3">ממשק ניהול סרטונים</h2>
                    <p class="text-slate-600 mt-2">עריכה וניהול של מאגרי הסרטונים.</p>
                </a>
            </article>
        </section>

        <div class="text-center mt-8">
            <a href="../altIndex.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 bg-white text-slate-700 hover:bg-slate-100">
                חזרה לדף הבית
            </a>
        </div>
    </main>
</body>
</html>
