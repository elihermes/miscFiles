    <script>
        // פונקציה מתוחכמת לקריאת CSV שמתמודדת עם מרכאות וירידות שורה בתוך התאים
        function csvToArray(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (let l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret;
        }

        // פונקציה לחילוץ ID של סרטון יוטיוב כדי להציג תמונה
        function getYouTubeID(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // ניקוי הקישור כדי לוודא שהוא ישיר ולא עובר דרך חיפוש
        function cleanLink(url) {
            if(!url) return "";
            // מסירים רווחים ותווים בלתי נראים שאולי הודבקו בטעות
            let cleanUrl = url.trim().replace(/['"]/g, '');
            if(!cleanUrl.startsWith('http')) {
                cleanUrl = 'https://' + cleanUrl;
            }
            return cleanUrl;
        }

        let allVideos = [];

        // טעינה ופענוח של הנתונים
        function initApp() {
            const rawCSV = document.getElementById('csvData').textContent.trim();
            const rows = csvToArray(rawCSV);
            
            // מתחילים משורה 1 כדי לדלג על הכותרות
            for(let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if(row.length < 5 || !row[1] || row[1].includes("שם הסרטון")) continue;

                // שדות ה-CSV (מותאם למבנה שסיפקת)
                const title = row[1].trim();
                const description = row[2] ? row[2].trim() : "";
                const keywords = row[3] ? row[3].trim() : "";
                const notes = row[4] ? row[4].trim() : "";
                
                // הקישור נמצא בדרך כלל בעמודה 5 (החדש), או בעמודה 11 אם אין חדש
                let linkRaw = row[5] ? row[5].trim() : "";
                if (!linkRaw && row.length > 11 && row[11]) {
                    linkRaw = row[11].trim();
                }

                if(!linkRaw || !linkRaw.includes('youtu')) continue;

                const link = cleanLink(linkRaw);
                const ytId = getYouTubeID(link);
                const thumbnail = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : 'https://via.placeholder.com/320x180?text=No+Thumbnail';

                // קביעת קטגוריה ראשית
                let category = "אחר";
                if(title.includes("אלקטרוסטטיקה")) category = "אלקטרוסטטיקה";
                else if(title.includes("מעגלי זרם")) category = "מעגלי זרם";
                else if(title.includes("מגנטיות") || title.includes('כא"מ')) category = "מגנטיות";

                allVideos.push({
                    title, description, keywords, notes, link, category, thumbnail
                });
            }

            renderVideos(allVideos);
            setupEventListeners();
        }

        // יצירת הכרטיסיות
        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            const count = document.getElementById('resultsCount');
            grid.innerHTML = '';
            count.textContent = videos.length;

            if(videos.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500 text-lg">לא נמצאו סרטונים התואמים לחיפוש.</div>`;
                return;
            }

            videos.forEach(video => {
                // חיתוך מילות מפתח לתגיות יפות
                let tagsHtml = '';
                if(video.keywords) {
                    const tags = video.keywords.split(',').slice(0, 3); // ניקח רק 3 ראשונים כדי שלא יעמיס
                    tagsHtml = tags.map(tag => `<span class="inline-block bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded border border-blue-100 mr-1 mb-1">${tag.trim()}</span>`).join('');
                }

                const card = document.createElement('div');
                card.className = "video-card bg-white rounded-xl overflow-hidden shadow-md flex flex-col border border-gray-100 transition-all duration-300";
                
                // חשוב: תגית a עם href נקי, target="_blank" מבטיח שזה יפתח חלון חדש לכתובת עצמה!
                card.innerHTML = `
                    <div class="relative">
                        <img src="${video.thumbnail}" alt="Video Thumbnail" class="w-full h-48 object-cover border-b border-gray-100">
                        <div class="absolute inset-0 bg-black bg-opacity-10 hover:bg-opacity-0 transition-all flex items-center justify-center pointer-events-none">
                            <i class="fab fa-youtube text-4xl text-white opacity-80 drop-shadow-md"></i>
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="text-xs font-semibold text-blue-600 mb-2">${video.category}</div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 leading-tight">${video.title}</h3>
                        <p class="text-sm text-gray-600 mb-4 line-clamp-3">${video.description || 'ללא תיאור'}</p>
                        
                        ${video.notes ? `<div class="bg-yellow-50 text-yellow-800 text-xs p-2 rounded mb-4 border border-yellow-200"><i class="fas fa-info-circle ml-1"></i> ${video.notes}</div>` : ''}
                        
                        <div class="mt-auto">
                            <div class="mb-4">${tagsHtml}</div>
                            <a href="${video.link}" target="_blank" rel="noopener noreferrer" 
                               class="block w-full text-center bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded transition-colors shadow-sm">
                                <i class="fas fa-play ml-2"></i> צפייה ביוטיוב
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            const filterBtns = document.querySelectorAll('.filter-btn');
            let currentCategory = 'all';

            function filterVideos() {
                const term = searchInput.value.toLowerCase();
                const filtered = allVideos.filter(video => {
                    const matchesSearch = video.title.toLowerCase().includes(term) || 
                                          video.description.toLowerCase().includes(term) || 
                                          video.keywords.toLowerCase().includes(term);
                    const matchesCategory = currentCategory === 'all' || video.category === currentCategory;
                    return matchesSearch && matchesCategory;
                });
                renderVideos(filtered);
            }

            searchInput.addEventListener('input', filterVideos);

            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // עיצוב הכפתור הלחוץ
                    filterBtns.forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white');
                        b.classList.add('bg-white', 'text-gray-700');
                    });
                    e.target.classList.remove('bg-white', 'text-gray-700');
                    e.target.classList.add('bg-blue-600', 'text-white');

                    currentCategory = e.target.getAttribute('data-category');
                    filterVideos();
                });
            });
        }

        // הפעלת האתר כשסיים להיטען
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
