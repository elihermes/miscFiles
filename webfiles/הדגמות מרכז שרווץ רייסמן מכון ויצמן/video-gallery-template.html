<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>גלריית סרטונים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f3f4f6; }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-gray-800">
    <header class="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold tracking-tight text-center">גלריית סרטונים</h1>
        </div>
    </header>
    <main class="container mx-auto px-4 py-8">
        <div class="mb-6 text-gray-600 font-medium">
            מציג <span id="resultsCount">0</span> פריטים
        </div>
        <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>
    <footer class="bg-gray-800 text-gray-400 text-center py-6 mt-12">
        <p>גלריית סרטונים</p>
    </footer>
    <script>
        // אין יותר מערך דמיוני, נטען רק מה-json

        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            const count = document.getElementById('resultsCount');
            grid.innerHTML = '';
            count.textContent = videos.length;
            if (videos.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500 text-lg">לא נמצאו תוצאות.</div>`;
                return;
            }
            videos.forEach(video => {
                const ytId = getYouTubeID(video.link);
                const thumbnail = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : 'https://via.placeholder.com/320x180?text=No+Thumbnail';
                let tagsHtml = '';
                if(video.keywords) {
                    const tags = video.keywords.split(',').slice(0, 2);
                    tagsHtml = tags.map(tag => `<span class="inline-block bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded border border-gray-200 mr-1 mb-1">${tag.trim()}</span>`).join('');
                }
                const card = document.createElement('div');
                card.className = "video-card bg-white rounded-xl overflow-hidden shadow-md flex flex-col border border-gray-100 transition-all duration-300";
                card.innerHTML = `
                    <div class="relative">
                        <img src="${thumbnail}" alt="Video Thumbnail" class="w-full h-48 object-cover border-b border-gray-100">
                        <div class="absolute inset-0 bg-black bg-opacity-10 hover:bg-opacity-0 transition-all flex items-center justify-center pointer-events-none">
                            <i class="fab fa-youtube text-4xl text-white opacity-80 drop-shadow-md"></i>
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="text-xs font-semibold text-blue-600 mb-2">${video.category}</div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 leading-tight">${video.title}</h3>
                        <p class="text-sm text-gray-600 mb-4">${video.description || 'ללא תיאור'}</p>
                        <div class="mt-auto">
                            <div class="mb-4">${tagsHtml}</div>
                            <a href="${video.link}" target="_blank" rel="noopener noreferrer" 
                               class="block w-full text-center bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded transition-colors shadow-sm">
                                <i class="fas fa-play ml-2"></i> צפייה ביוטיוב
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
                fetch('videos.json')
                    .then(response => {
                        if (!response.ok) {
                            console.error('שגיאה בטעינת videos.json:', response.status);
                            renderVideos([]);
                            return;
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (!Array.isArray(data)) {
                            console.error('videos.json לא מכיל מערך תקין:', data);
                            renderVideos([]);
                            return;
                        }
                        renderVideos(data);
                    })
                    .catch(err => {
                        console.error('שגיאת fetch/פענוח videos.json:', err);
                        renderVideos([]);
                    });
        });
    </script>
</body>
</html>
