<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>גלריית סרטונים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f3f4f6; }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-gray-800">
    <header class="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold tracking-tight text-center">גלריית סרטונים</h1>
        </div>
    </header>
    <main class="container mx-auto px-4 py-8">
        <div class="mb-4">
            <div class="relative max-w-xl">
                <input id="searchInput" type="search" placeholder="חיפוש לפי שם, תיאור, מילות מפתח או פלייליסט..."
                       class="w-full border border-gray-300 rounded-lg py-3 pr-10 pl-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>
        </div>
        <div class="mb-6 text-gray-600 font-medium">
            מציג <span id="resultsCount">0</span> פריטים
        </div>
        <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="playlistModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[60] p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] rounded-xl shadow-2xl overflow-hidden flex flex-col">
            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
                <h2 id="playlistModalTitle" class="text-xl font-bold text-gray-800">פלייליסט</h2>
                <button id="closePlaylistModal" class="text-gray-500 hover:text-gray-700 text-2xl leading-none" aria-label="סגירה">&times;</button>
            </div>
            <div id="playlistModalBody" class="p-5 overflow-y-auto"></div>
        </div>
    </div>
    <footer class="bg-gray-800 text-gray-400 text-center py-6 mt-12">
        <p>גלריית סרטונים</p>
    </footer>
    <script>
        // אין יותר מערך דמיוני, נטען רק מה-json

        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function buildDisplayItems(videos) {
            const grouped = new Map();

            videos.forEach(video => {
                const isPart = Boolean(video.isPlaylistPart);
                const id = (video.playlistId || '').trim();
                if (!isPart || !id) return;

                if (!grouped.has(id)) {
                    grouped.set(id, {
                        id,
                        title: (video.playlistTitle || video.title || '').trim(),
                        category: video.category,
                        total: Number(video.playlistTotal) || 0,
                        videos: []
                    });
                }

                grouped.get(id).videos.push(video);
            });

            grouped.forEach(group => {
                group.videos.sort((a, b) => {
                    const pa = Number(a.playlistPart) || 999;
                    const pb = Number(b.playlistPart) || 999;
                    return pa - pb || a.title.localeCompare(b.title, 'he');
                });
            });

            const displayItems = [];
            const usedPlaylistIds = new Set();

            videos.forEach(video => {
                const isPart = Boolean(video.isPlaylistPart);
                const id = (video.playlistId || '').trim();
                const group = id ? grouped.get(id) : null;

                if (!isPart || !id || !group || group.videos.length < 2) {
                    displayItems.push({ type: 'single', video });
                    return;
                }

                if (usedPlaylistIds.has(id)) return;
                usedPlaylistIds.add(id);
                displayItems.push({
                    type: 'playlist',
                    title: group.title,
                    category: group.category,
                    total: group.total,
                    videos: group.videos
                });
            });

            return displayItems;
        }

        function normalizeText(value) {
            return (value || '').toString().toLowerCase().trim();
        }

        function matchesVideo(video, q) {
            if (!q) return true;
            const haystack = [
                video.title,
                video.description,
                video.keywords,
                video.category,
                video.playlistTitle
            ].map(normalizeText).join(' | ');
            return haystack.includes(q);
        }

        function filterDisplayItems(displayItems, query) {
            const q = normalizeText(query);
            if (!q) return displayItems;

            return displayItems.filter(item => {
                if (item.type === 'single') {
                    return matchesVideo(item.video, q);
                }

                const playlistText = [item.title, item.category].map(normalizeText).join(' | ');
                if (playlistText.includes(q)) return true;
                return item.videos.some(video => matchesVideo(video, q));
            });
        }

        function openPlaylistModal(playlist) {
            const modal = document.getElementById('playlistModal');
            const modalTitle = document.getElementById('playlistModalTitle');
            const modalBody = document.getElementById('playlistModalBody');

            modalTitle.textContent = `${playlist.title} (${playlist.videos.length} חלקים)`;
            modalBody.innerHTML = '';

            playlist.videos.forEach(part => {
                const ytId = getYouTubeID(part.link);
                const thumbnail = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : 'https://via.placeholder.com/320x180?text=No+Thumbnail';
                const row = document.createElement('div');
                row.className = 'border border-gray-200 rounded-lg p-3 mb-3 flex flex-col md:flex-row gap-3 items-start';
                row.innerHTML = `
                    <img src="${thumbnail}" alt="thumbnail" class="w-full md:w-48 h-28 object-cover rounded border border-gray-200">
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-800 mb-1">${part.title}</h4>
                        <p class="text-sm text-gray-600 mb-3">${part.description || 'ללא תיאור'}</p>
                        <a href="${part.link}" target="_blank" rel="noopener noreferrer"
                           class="inline-block bg-red-600 hover:bg-red-700 text-white text-sm font-medium py-2 px-3 rounded transition-colors">
                           <i class="fas fa-play ml-1"></i> צפייה ביוטיוב
                        </a>
                    </div>
                `;
                modalBody.appendChild(row);
            });

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closePlaylistModal() {
            const modal = document.getElementById('playlistModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function renderVideos(videos, searchQuery = '') {
            const grid = document.getElementById('videoGrid');
            const count = document.getElementById('resultsCount');
            const displayItems = filterDisplayItems(buildDisplayItems(videos), searchQuery);
            grid.innerHTML = '';
            count.textContent = displayItems.length;
            if (displayItems.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500 text-lg">לא נמצאו תוצאות.</div>`;
                return;
            }

            displayItems.forEach(item => {
                if (item.type === 'playlist') {
                    const first = item.videos[0];
                    const ytId = getYouTubeID(first.link);
                    const thumbnail = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : 'https://via.placeholder.com/320x180?text=No+Thumbnail';
                    const card = document.createElement('div');
                    card.className = "video-card bg-white rounded-xl overflow-hidden shadow-md flex flex-col border border-blue-200 transition-all duration-300";
                    card.innerHTML = `
                        <div class="relative">
                            <img src="${thumbnail}" alt="Playlist Thumbnail" class="w-full h-48 object-cover border-b border-gray-100">
                            <div class="absolute top-2 right-2 bg-blue-700 text-white text-xs font-bold px-2 py-1 rounded-full">
                                פלייליסט
                            </div>
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <div class="text-xs font-semibold text-blue-600 mb-2">${item.category}</div>
                            <h3 class="text-lg font-bold text-gray-800 mb-2 leading-tight">${item.title}</h3>
                            <p class="text-sm text-gray-600 mb-4">${item.total || item.videos.length} חלקים בסדרה</p>
                            <div class="mt-auto">
                                <button class="open-playlist-btn block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition-colors shadow-sm">
                                    <i class="fas fa-list ml-2"></i> פתיחת פלייליסט
                                </button>
                            </div>
                        </div>
                    `;
                    card.querySelector('.open-playlist-btn').addEventListener('click', () => openPlaylistModal(item));
                    grid.appendChild(card);
                    return;
                }

                const video = item.video;
                const ytId = getYouTubeID(video.link);
                const thumbnail = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : 'https://via.placeholder.com/320x180?text=No+Thumbnail';
                let tagsHtml = '';
                if(video.keywords) {
                    const tags = video.keywords.split(',').slice(0, 2);
                    tagsHtml = tags.map(tag => `<span class="inline-block bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded border border-gray-200 mr-1 mb-1">${tag.trim()}</span>`).join('');
                }
                const card = document.createElement('div');
                card.className = "video-card bg-white rounded-xl overflow-hidden shadow-md flex flex-col border border-gray-100 transition-all duration-300";
                card.innerHTML = `
                    <div class="relative">
                        <img src="${thumbnail}" alt="Video Thumbnail" class="w-full h-48 object-cover border-b border-gray-100">
                        <div class="absolute inset-0 bg-black bg-opacity-10 hover:bg-opacity-0 transition-all flex items-center justify-center pointer-events-none">
                            <i class="fab fa-youtube text-4xl text-white opacity-80 drop-shadow-md"></i>
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="text-xs font-semibold text-blue-600 mb-2">${video.category}</div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 leading-tight">${video.title}</h3>
                        <p class="text-sm text-gray-600 mb-4">${video.description || 'ללא תיאור'}</p>
                        <div class="mt-auto">
                            <div class="mb-4">${tagsHtml}</div>
                            <a href="${video.link}" target="_blank" rel="noopener noreferrer" 
                               class="block w-full text-center bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded transition-colors shadow-sm">
                                <i class="fas fa-play ml-2"></i> צפייה ביוטיוב
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
                let allVideos = [];

                function applySearch() {
                    const q = document.getElementById('searchInput').value;
                    renderVideos(allVideos, q);
                }

                document.getElementById('closePlaylistModal').addEventListener('click', closePlaylistModal);
                document.getElementById('playlistModal').addEventListener('click', (e) => {
                    if (e.target.id === 'playlistModal') closePlaylistModal();
                });
                document.getElementById('searchInput').addEventListener('input', applySearch);

                fetch('videos.json')
                    .then(response => {
                        if (!response.ok) {
                            console.error('שגיאה בטעינת videos.json:', response.status);
                            allVideos = [];
                            renderVideos([]);
                            return;
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (!Array.isArray(data)) {
                            console.error('videos.json לא מכיל מערך תקין:', data);
                            allVideos = [];
                            renderVideos([]);
                            return;
                        }
                        allVideos = data;
                        applySearch();
                    })
                    .catch(err => {
                        console.error('שגיאת fetch/פענוח videos.json:', err);
                        allVideos = [];
                        renderVideos([]);
                    });
        });
    </script>
</body>
</html>
