<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפריט ראשי - פתרונות במכניקה</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #334155;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-100: #dbeafe;
            --blue-50: #eff6ff;
            --blue-border: #93c5fd;
            --green-50: #f0fdf4;
            --green-500: #22c55e;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
        }

        html {
            overflow-x: clip;
        }

        body {
            font-family: "Rubik", "Segoe UI", Tahoma, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.65;
            overflow-x: clip;
            margin: 0;
        }

        .page-shell {
            max-width: 980px;
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: 3rem;
        }

        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--slate-200);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
        }

        .section-header {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e3a8a;
            border-bottom: 2px solid var(--slate-200);
            padding-bottom: 0.5rem;
            margin-bottom: 0.9rem;
        }

        .version-stamp {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.28rem 0.55rem;
            border-radius: 9999px;
            border: 1px solid #bfdbfe;
            background: rgba(239, 246, 255, 0.95);
            color: #1e3a8a;
            font-size: 0.72rem;
            font-weight: 600;
            line-height: 1;
            margin-top: 0.45rem;
        }

        .version-stamp .version-label {
            color: #1d4ed8;
            font-weight: 700;
            text-transform: uppercase;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            max-width: 100%;
        }

        .filter-stack {
            display: grid;
            gap: 0.9rem;
        }

        .topics-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .topic-filter-box {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .topic-chip {
            border: 1px solid var(--slate-300);
            background: #fff;
            color: #334155;
            border-radius: 9999px;
            padding: 0.42rem 0.8rem;
            font: inherit;
            font-size: 0.92rem;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
        }

        .topic-chip:hover {
            border-color: var(--blue-border);
            transform: translateY(-1px);
        }

        .topic-chip.is-active {
            background: var(--blue-700);
            color: #eff6ff;
            border-color: var(--blue-700);
        }

        .topic-chip.is-empty {
            opacity: 0.55;
        }

        .topic-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.45rem;
            height: 1.45rem;
            padding: 0 0.35rem;
            margin-inline-start: 0.35rem;
            border-radius: 9999px;
            background: #e2e8f0;
            color: #334155;
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1;
        }

        .topic-chip.is-active .topic-count {
            background: rgba(255, 255, 255, 0.18);
            color: #eff6ff;
        }

        .filter-note {
            font-size: 0.88rem;
            color: #64748b;
        }

        .sort-toolbar {
            display: flex;
            justify-content: flex-start;
            margin-top: 0.25rem;
        }

        .solution-item {
            border: 1px solid var(--slate-200);
            border-radius: 0.75rem;
            padding: 0.9rem;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            background: #fff;
            display: grid;
            grid-template-columns: 96px 1fr;
            gap: 0.9rem;
            align-items: start;
        }

        .solution-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
            border-color: var(--blue-border);
        }

        .solution-link {
            color: var(--blue-700);
            font-weight: 700;
            text-decoration: none;
        }

        .solution-link:hover {
            text-decoration: underline;
        }

        .meta-pill {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            border-radius: 9999px;
            border: 1px solid var(--slate-300);
            font-size: 0.78rem;
            margin-left: 0.3rem;
            color: #475569;
            background: #f8fafc;
        }

        .meta-pill.topic {
            border-color: #bfdbfe;
            color: #1d4ed8;
            background: #eff6ff;
        }

        .meta-pill.pending {
            border-color: #fed7aa;
            color: #9a3412;
            background: #fff7ed;
        }

        .empty-state {
            background: var(--green-50);
            border-right: 4px solid var(--green-500);
            border-radius: 0.5rem 0 0 0.5rem;
            padding: 0.9rem;
            color: #166534;
        }

        .solution-thumb {
            width: 96px;
            height: 96px;
            border-radius: 0.6rem;
            object-fit: cover;
            border: 1px solid var(--slate-300);
            background: #f8fafc;
        }

        .thumb-fallback {
            width: 96px;
            height: 96px;
            border-radius: 0.6rem;
            border: 1px dashed var(--slate-300);
            background: #f8fafc;
            color: #64748b;
            font-size: 0.75rem;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.35rem;
        }

        .hover-preview {
            position: fixed;
            z-index: 200;
            display: none;
            pointer-events: none;
            background: #ffffff;
            border: 1px solid var(--slate-300);
            border-radius: 0.75rem;
            box-shadow: 0 16px 38px rgba(15, 23, 42, 0.22);
            padding: 0.5rem;
            max-width: min(68vw, 900px);
            max-height: min(82vh, 900px);
        }

        .hover-preview img {
            display: block;
            max-width: min(66vw, 860px);
            max-height: min(78vh, 860px);
            width: auto;
            height: auto;
            border-radius: 0.5rem;
            border: 1px solid var(--slate-200);
            background: #f8fafc;
        }

        @media (max-width: 900px) {
            .hover-preview {
                display: none !important;
            }
        }

        @media (max-width: 640px) {
            .page-shell {
                padding: 0.75rem;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }

            .solution-item {
                grid-template-columns: 1fr;
            }

            .solution-thumb,
            .thumb-fallback {
                width: 100%;
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-900 mb-2">תפריט ראשי - פתרונות בגרות במכניקה</h1>
            <h2 class="text-xl md:text-2xl text-slate-600">גישה מהירה לכל הפתרונות במקום אחד</h2>
            <p class="mt-3 text-slate-500">אפשר לסנן לפי שנה ולקפוץ ישירות לכל פתרון. לכל פריט מוצגת תמונת שאלה מקדימה.</p>
            <div class="version-stamp" id="versionStamp" dir="ltr" aria-label="Version stamp">
                <span class="version-label">ver</span>
                <span id="versionId">vAUTO</span>
                <span>|</span>
                <span id="versionUpdatedAt">auto</span>
            </div>
        </header>

        <section class="section-card">
            <h3 class="section-header">סינון</h3>
            <div class="filter-grid">
                <div class="filter-stack">
                    <label class="block max-w-xs">
                        <span class="block text-sm font-semibold text-slate-700 mb-1">סינון לפי שנה</span>
                        <select id="yearSelect" class="w-full rounded-lg border border-slate-300 p-2.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-200">
                            <option value="all">כל השנים</option>
                        </select>
                    </label>

                    <div>
                        <div class="topics-toolbar mb-2">
                            <span class="block text-sm font-semibold text-slate-700">סינון לפי נושאים</span>
                            <button id="clearTopicsBtn" type="button" class="text-sm text-blue-700 hover:underline">נקה תגיות</button>
                        </div>
                        <div id="topicsFilter" class="topic-filter-box"></div>
                        <p class="filter-note mt-2">אפשר לבחור כמה נושאים יחד. יוצגו שאלות שמכילות לפחות אחד מהנושאים שנבחרו.</p>
                    </div>

                    <div class="sort-toolbar">
                        <button id="sortByRecentBtn" type="button" class="topic-chip" aria-pressed="false">מיון: ברירת מחדל</button>
                    </div>
                </div>
            </div>

            <p id="resultsInfo" class="mt-3 text-sm text-slate-500"></p>
        </section>

        <section class="section-card">
            <h3 class="section-header">רשימת פתרונות</h3>
            <div id="solutionsList" class="space-y-3"></div>
        </section>

    </div>

    <div id="hoverPreview" class="hover-preview" aria-hidden="true">
        <img id="hoverPreviewImg" alt="תצוגה מוגדלת של השאלה">
    </div>

    <script>
        const staticSolutions = [];
        const folderNamePattern = /^(\d{4})\s+שאלה\s+(.+)$/;
        const MECHANICS_FOLDER_REPO_PATH = "webfiles/פתרונות שאלות בגרות/מכניקה שאלות בגרות";
        const DISCOVERY_EXCLUDED_FILES = new Set([
            "question-topics.json",
            "תפריט ראשי מכניקה.html",
            "ניהול נושאי שאלות מכניקה.html"
        ]);

        const yearSelect = document.getElementById("yearSelect");
        const resultsInfo = document.getElementById("resultsInfo");
        const listEl = document.getElementById("solutionsList");
        const topicsFilterEl = document.getElementById("topicsFilter");
        const clearTopicsBtn = document.getElementById("clearTopicsBtn");
        const sortByRecentBtn = document.getElementById("sortByRecentBtn");
        const hoverPreview = document.getElementById("hoverPreview");
        const hoverPreviewImg = document.getElementById("hoverPreviewImg");

        let previewActive = false;
        let solutions = [...staticSolutions];
        let topicCatalog = [];
        const selectedTopics = new Set();
        let sortByRecent = false;

        function isLocalhost() {
            return window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        }

        function parseFromFolderName(folderName) {
            const match = folderName.match(folderNamePattern);
            if (!match) {
                return null;
            }

            return {
                year: Number(match[1]),
                question: match[2],
                title: folderName
            };
        }

        function compareSolutions(a, b) {
            if (a.year !== b.year) {
                return a.year - b.year;
            }
            return String(a.question).localeCompare(String(b.question), "he", { numeric: true });
        }

        function compareSolutionsByRecent(a, b) {
            const aOrder = Number.isFinite(a.addedOrder) ? a.addedOrder : -1;
            const bOrder = Number.isFinite(b.addedOrder) ? b.addedOrder : -1;
            if (aOrder !== bOrder) {
                return bOrder - aOrder;
            }
            return compareSolutions(a, b);
        }

        function syncSortButtonUi() {
            if (!sortByRecentBtn) {
                return;
            }

            sortByRecentBtn.textContent = sortByRecent ? "מיון: נוסף אחרון" : "מיון: ברירת מחדל";
            sortByRecentBtn.setAttribute("aria-pressed", sortByRecent ? "true" : "false");
            sortByRecentBtn.classList.toggle("is-active", sortByRecent);
        }

        function normalizeSlashes(path) {
            return String(path || "").replace(/\\/g, "/").replace(/^\/+/, "");
        }

        function normalizeRelativeQuestionPath(path) {
            let normalized = normalizeSlashes(path);
            if (normalized.startsWith("./")) {
                normalized = normalized.slice(2);
            }
            if (normalized.startsWith(`${MECHANICS_FOLDER_REPO_PATH}/`)) {
                normalized = normalized.slice(MECHANICS_FOLDER_REPO_PATH.length + 1);
            }
            return normalized;
        }

        function extractTitleFromPath(path) {
            const normalized = normalizeRelativeQuestionPath(path);
            const parts = normalized.split("/").filter(Boolean);
            return parts.length >= 2 ? parts[0] : "";
        }

        function createIdFromTitle(title, usedIds) {
            const parsed = parseFromFolderName(title);
            const base = parsed ? `${parsed.year}-${String(parsed.question).replace(/\s+/g, "-")}` : title.replace(/\s+/g, "-");
            let candidate = base;
            let i = 2;
            while (usedIds.has(candidate)) {
                candidate = `${base}-${i}`;
                i += 1;
            }
            usedIds.add(candidate);
            return candidate;
        }

        function getRepoContextFromLocation() {
            const hostMatch = window.location.hostname.match(/^([^.]+)\.github\.io$/);
            if (!hostMatch) {
                return null;
            }
            const pathParts = window.location.pathname.split("/").filter(Boolean);
            if (!pathParts.length) {
                return null;
            }
            return { owner: hostMatch[1], repo: pathParts[0] };
        }

        function isQuestionHtmlPath(path) {
            const normalized = normalizeRelativeQuestionPath(path);
            const parts = normalized.split("/").filter(Boolean);
            if (parts.length < 2) {
                return false;
            }
            const fileName = parts[parts.length - 1];
            if (!fileName.toLowerCase().endsWith(".html")) {
                return false;
            }
            if (DISCOVERY_EXCLUDED_FILES.has(fileName)) {
                return false;
            }
            return folderNamePattern.test(parts[0]);
        }

        async function discoverQuestionPaths() {
            const discovered = new Set();

            if (isLocalhost()) {
                const response = await fetch("/api/local-tree", { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("local-tree-unavailable");
                }
                const data = await response.json();
                const tree = Array.isArray(data.tree) ? data.tree : [];
                tree.forEach((node) => {
                    if (!node || node.type !== "blob" || typeof node.path !== "string") {
                        return;
                    }
                    if (!node.path.startsWith(`${MECHANICS_FOLDER_REPO_PATH}/`)) {
                        return;
                    }
                    if (!isQuestionHtmlPath(node.path)) {
                        return;
                    }
                    discovered.add(normalizeRelativeQuestionPath(node.path));
                });
                return [...discovered];
            }

            const ctx = getRepoContextFromLocation();
            if (!ctx) {
                return [];
            }

            const encodedPath = MECHANICS_FOLDER_REPO_PATH.split("/").map(encodeURIComponent).join("/");
            const treeUrl = `https://api.github.com/repos/${ctx.owner}/${ctx.repo}/git/trees/HEAD?recursive=1`;
            const response = await fetch(treeUrl, { cache: "no-store" });
            if (!response.ok) {
                throw new Error("github-tree-unavailable");
            }
            const data = await response.json();
            const tree = Array.isArray(data.tree) ? data.tree : [];
            tree.forEach((node) => {
                if (!node || node.type !== "blob" || typeof node.path !== "string") {
                    return;
                }
                if (!node.path.startsWith(`${MECHANICS_FOLDER_REPO_PATH}/`)) {
                    return;
                }
                if (!isQuestionHtmlPath(node.path)) {
                    return;
                }
                discovered.add(normalizeRelativeQuestionPath(node.path));
            });
            return [...discovered];
        }

        function mergeTopicDataWithDiscovered(topicData, discoveredPaths) {
            const questions = Array.isArray(topicData.questions) ? topicData.questions.map((q) => ({ ...q })) : [];
            const topics = Array.isArray(topicData.topics) ? topicData.topics : [];

            const byPath = new Map();
            const existingTitles = new Set();
            const usedIds = new Set();
            questions.forEach((question) => {
                const normalizedPath = normalizeRelativeQuestionPath(question.path);
                question.path = normalizedPath;
                if (!Array.isArray(question.topics)) {
                    question.topics = [];
                }
                byPath.set(normalizedPath, question);
                if (question.title) {
                    existingTitles.add(String(question.title));
                }
                if (question.id) {
                    usedIds.add(question.id);
                }
            });

            discoveredPaths.forEach((path) => {
                const normalizedPath = normalizeRelativeQuestionPath(path);
                if (byPath.has(normalizedPath)) {
                    return;
                }
                const title = extractTitleFromPath(normalizedPath) || normalizedPath;
                // Avoid duplicate "pending tagging" rows when a folder already has a tagged main entry.
                if (existingTitles.has(title)) {
                    return;
                }
                const id = createIdFromTitle(title, usedIds);
                const newQuestion = {
                    id,
                    title,
                    path: normalizedPath,
                    topics: []
                };
                questions.push(newQuestion);
                byPath.set(normalizedPath, newQuestion);
                existingTitles.add(title);
            });

            const dedupedByTitle = new Map();
            questions.forEach((question) => {
                const title = String(question.title || "").trim();
                if (!title) {
                    return;
                }

                const current = dedupedByTitle.get(title);
                if (!current) {
                    dedupedByTitle.set(title, question);
                    return;
                }

                const currentTagged = Array.isArray(current.topics) && current.topics.length > 0;
                const candidateTagged = Array.isArray(question.topics) && question.topics.length > 0;

                // If one duplicate is tagged and the other is empty, keep the tagged entry.
                if (!currentTagged && candidateTagged) {
                    dedupedByTitle.set(title, question);
                }
            });

            return { topics, questions: [...dedupedByTitle.values()] };
        }

        async function loadSolutionsFromTopicsJson() {
            const response = await fetch("./question-topics.json", { cache: "no-store" });
            if (!response.ok) {
                throw new Error("topics-json-load-failed");
            }

            const rawData = await response.json();
            const discoveredPaths = await discoverQuestionPaths();
            const data = mergeTopicDataWithDiscovered(rawData, discoveredPaths);
            const questions = Array.isArray(data.questions) ? data.questions : [];
            topicCatalog = Array.isArray(data.topics) ? data.topics : [];

            return questions.map((entry, index) => {
                const parsed = parseFromFolderName(entry.title) || { year: 0, question: "?", title: entry.title };
                const topicTags = Array.isArray(entry.topics) ? entry.topics : [];
                const needsTagging = topicTags.length === 0;
                return {
                    year: parsed.year,
                    question: parsed.question,
                    title: entry.title,
                    href: `./${entry.path}`,
                    tags: ["מכניקה", "בגרות", ...topicTags],
                    topicTags,
                    needsTagging,
                    addedOrder: index
                };
            });
        }

        function movePreview(event) {
            if (!previewActive) {
                return;
            }

            const margin = 18;
            const rect = hoverPreview.getBoundingClientRect();
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            let x = event.clientX + margin;
            let y = event.clientY + margin;

            if (x + rect.width > vw - 8) {
                x = event.clientX - rect.width - margin;
            }
            if (y + rect.height > vh - 8) {
                y = event.clientY - rect.height - margin;
            }

            x = Math.max(8, x);
            y = Math.max(8, y);

            hoverPreview.style.left = `${x}px`;
            hoverPreview.style.top = `${y}px`;
        }

        function hidePreview() {
            previewActive = false;
            hoverPreview.style.display = "none";
        }

        function attachThumbnailPreviewHandlers(scope) {
            const thumbs = scope.querySelectorAll(".solution-thumb");
            thumbs.forEach((thumb) => {
                thumb.addEventListener("mouseenter", (event) => {
                    if (window.matchMedia("(max-width: 900px)").matches || !thumb.currentSrc) {
                        return;
                    }

                    hoverPreviewImg.src = thumb.currentSrc;
                    hoverPreview.style.display = "block";
                    previewActive = true;
                    movePreview(event);
                });

                thumb.addEventListener("mousemove", movePreview);
                thumb.addEventListener("mouseleave", hidePreview);
            });
        }

        function yearOptionsInit() {
            yearSelect.innerHTML = '<option value="all">כל השנים</option>';
            const years = [...new Set(solutions.map((s) => s.year))].sort((a, b) => a - b);
            years.forEach((y) => {
                const opt = document.createElement("option");
                opt.value = String(y);
                opt.textContent = String(y);
                yearSelect.appendChild(opt);
            });
        }

        function getTopicCountForCurrentYear(topic) {
            const yearVal = yearSelect.value;
            return solutions.filter((solution) => {
                const yearOk = yearVal === "all" || String(solution.year) === yearVal;
                return yearOk && (solution.topicTags || []).includes(topic);
            }).length;
        }

        function renderTopicFilters() {
            topicsFilterEl.innerHTML = "";

            topicCatalog.forEach((topic) => {
                const count = getTopicCountForCurrentYear(topic);
                const button = document.createElement("button");
                button.type = "button";
                button.className = "topic-chip";
                if (selectedTopics.has(topic)) {
                    button.classList.add("is-active");
                }
                if (count === 0) {
                    button.classList.add("is-empty");
                }

                const label = document.createElement("span");
                label.textContent = topic;

                const countBadge = document.createElement("span");
                countBadge.className = "topic-count";
                countBadge.textContent = String(count);

                button.append(label, countBadge);
                button.addEventListener("click", () => {
                    if (selectedTopics.has(topic)) {
                        selectedTopics.delete(topic);
                    } else {
                        selectedTopics.add(topic);
                    }
                    renderTopicFilters();
                    runFilter();
                });
                topicsFilterEl.appendChild(button);
            });
        }

        function render(items) {
            listEl.innerHTML = "";

            if (!items.length) {
                const empty = document.createElement("div");
                empty.className = "empty-state";
                empty.textContent = "לא נמצאו פתרונות התואמים את הסינון. נסה/י מילה אחרת או שנה אחרת.";
                listEl.appendChild(empty);
            } else {
                items.forEach((item) => {
                    const card = document.createElement("article");
                    card.className = "solution-item";

                    const folderPath = item.href.slice(0, item.href.lastIndexOf("/"));
                    const thumbPath = `${folderPath}/question-image.png`;
                    const tagsHtml = (item.tags || []).map((t) => {
                        const cls = (item.topicTags || []).includes(t) ? "meta-pill topic" : "meta-pill";
                        return `<span class="${cls}">${t}</span>`;
                    }).join(" ");
                    const pendingTag = item.needsTagging ? '<span class="meta-pill pending">נדרש תיוג</span>' : "";

                    card.innerHTML = `
                        <div>
                            <img class="solution-thumb" src="${thumbPath}" alt="תמונה מקדימה - ${item.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="thumb-fallback">אין תמונה מקדימה</div>
                        </div>
                        <div>
                            <a class="solution-link" href="${item.href}">${item.title}</a>
                            <div class="mt-2 text-sm text-slate-600">שנה: <strong>${item.year}</strong> | שאלה: <strong>${item.question}</strong></div>
                            <div class="mt-2">${pendingTag} ${tagsHtml}</div>
                        </div>
                    `;

                    listEl.appendChild(card);
                    attachThumbnailPreviewHandlers(card);
                });
            }

        }

        function runFilter() {
            const yearVal = yearSelect.value;
            renderTopicFilters();

            const filtered = solutions.filter((s) => {
                const yearOk = yearVal === "all" || String(s.year) === yearVal;
                const topicOk = selectedTopics.size === 0
                    || [...selectedTopics].some((topic) => (s.topicTags || []).includes(topic));
                return yearOk && topicOk;
            });

            filtered.sort(sortByRecent ? compareSolutionsByRecent : compareSolutions);
            render(filtered);

            const yearText = yearVal === "all" ? "כל השנים" : `שנה ${yearVal}`;
            const topicsText = selectedTopics.size ? ` | נושאים: ${[...selectedTopics].join(", ")}` : "";
            const sortText = sortByRecent ? " | מיון: נוסף אחרון" : "";
            resultsInfo.textContent = `נמצאו ${filtered.length} פתרונות עבור ${yearText}${topicsText}${sortText}.`;
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const versionStamp = document.getElementById("versionStamp");
            const versionId = document.getElementById("versionId");
            const versionUpdatedAt = document.getElementById("versionUpdatedAt");
            if (versionStamp) {
                versionStamp.title = "Last file modified: " + document.lastModified;
            }

            const modified = new Date(document.lastModified);
            if (!Number.isNaN(modified.getTime())) {
                const pad = (n) => String(n).padStart(2, "0");
                const y = modified.getFullYear();
                const m = pad(modified.getMonth() + 1);
                const d = pad(modified.getDate());
                const hh = pad(modified.getHours());
                const mm = pad(modified.getMinutes());

                if (versionId) {
                    versionId.textContent = `v${y}${m}${d}-${hh}${mm}`;
                }
                if (versionUpdatedAt) {
                    versionUpdatedAt.textContent = `${y}-${m}-${d} ${hh}:${mm}`;
                }
            }

            try {
                solutions = await loadSolutionsFromTopicsJson();
            } catch (_err) {
                solutions = [...staticSolutions];
                topicCatalog = [];
            }

            yearOptionsInit();
            renderTopicFilters();
            syncSortButtonUi();
            runFilter();
            yearSelect.addEventListener("change", runFilter);
            clearTopicsBtn.addEventListener("click", () => {
                selectedTopics.clear();
                renderTopicFilters();
                runFilter();
            });
            if (sortByRecentBtn) {
                sortByRecentBtn.addEventListener("click", () => {
                    sortByRecent = !sortByRecent;
                    syncSortButtonUi();
                    runFilter();
                });
            }
        });
    </script>
</body>
</html>
