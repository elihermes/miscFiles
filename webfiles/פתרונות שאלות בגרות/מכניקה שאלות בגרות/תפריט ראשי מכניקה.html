<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפריט ראשי - פתרונות במכניקה</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #334155;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-100: #dbeafe;
            --blue-50: #eff6ff;
            --blue-border: #93c5fd;
            --green-50: #f0fdf4;
            --green-500: #22c55e;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
        }

        html {
            overflow-x: clip;
        }

        body {
            font-family: "Rubik", "Segoe UI", Tahoma, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.65;
            overflow-x: clip;
            margin: 0;
        }

        .page-shell {
            max-width: 980px;
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: 3rem;
        }

        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--slate-200);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
        }

        .section-header {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e3a8a;
            border-bottom: 2px solid var(--slate-200);
            padding-bottom: 0.5rem;
            margin-bottom: 0.9rem;
        }

        .version-stamp {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.28rem 0.55rem;
            border-radius: 9999px;
            border: 1px solid #bfdbfe;
            background: rgba(239, 246, 255, 0.95);
            color: #1e3a8a;
            font-size: 0.72rem;
            font-weight: 600;
            line-height: 1;
            margin-top: 0.45rem;
        }

        .version-stamp .version-label {
            color: #1d4ed8;
            font-weight: 700;
            text-transform: uppercase;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            max-width: 260px;
        }

        .solution-item {
            border: 1px solid var(--slate-200);
            border-radius: 0.75rem;
            padding: 0.9rem;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            background: #fff;
            display: grid;
            grid-template-columns: 96px 1fr;
            gap: 0.9rem;
            align-items: start;
        }

        .solution-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
            border-color: var(--blue-border);
        }

        .solution-link {
            color: var(--blue-700);
            font-weight: 700;
            text-decoration: none;
        }

        .solution-link:hover {
            text-decoration: underline;
        }

        .meta-pill {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            border-radius: 9999px;
            border: 1px solid var(--slate-300);
            font-size: 0.78rem;
            margin-left: 0.3rem;
            color: #475569;
            background: #f8fafc;
        }

        .empty-state {
            background: var(--green-50);
            border-right: 4px solid var(--green-500);
            border-radius: 0.5rem 0 0 0.5rem;
            padding: 0.9rem;
            color: #166534;
        }

        .solution-thumb {
            width: 96px;
            height: 96px;
            border-radius: 0.6rem;
            object-fit: cover;
            border: 1px solid var(--slate-300);
            background: #f8fafc;
        }

        .thumb-fallback {
            width: 96px;
            height: 96px;
            border-radius: 0.6rem;
            border: 1px dashed var(--slate-300);
            background: #f8fafc;
            color: #64748b;
            font-size: 0.75rem;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.35rem;
        }

        .hover-preview {
            position: fixed;
            z-index: 200;
            display: none;
            pointer-events: none;
            background: #ffffff;
            border: 1px solid var(--slate-300);
            border-radius: 0.75rem;
            box-shadow: 0 16px 38px rgba(15, 23, 42, 0.22);
            padding: 0.5rem;
            max-width: min(68vw, 900px);
            max-height: min(82vh, 900px);
        }

        .hover-preview img {
            display: block;
            max-width: min(66vw, 860px);
            max-height: min(78vh, 860px);
            width: auto;
            height: auto;
            border-radius: 0.5rem;
            border: 1px solid var(--slate-200);
            background: #f8fafc;
        }

        @media (max-width: 900px) {
            .hover-preview {
                display: none !important;
            }
        }

        @media (max-width: 640px) {
            .page-shell {
                padding: 0.75rem;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }

            .solution-item {
                grid-template-columns: 1fr;
            }

            .solution-thumb,
            .thumb-fallback {
                width: 100%;
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-900 mb-2">תפריט ראשי - פתרונות בגרות במכניקה</h1>
            <h2 class="text-xl md:text-2xl text-slate-600">גישה מהירה לכל הפתרונות במקום אחד</h2>
            <p class="mt-3 text-slate-500">אפשר לסנן לפי שנה ולקפוץ ישירות לכל פתרון. לכל פריט מוצגת תמונת שאלה מקדימה.</p>
            <div class="version-stamp" id="versionStamp" dir="ltr" aria-label="Version stamp">
                <span class="version-label">ver</span>
                <span id="versionId">vAUTO</span>
                <span>|</span>
                <span id="versionUpdatedAt">auto</span>
            </div>
        </header>

        <section class="section-card">
            <h3 class="section-header">סינון</h3>
            <div class="filter-grid">
                <label class="block">
                    <span class="block text-sm font-semibold text-slate-700 mb-1">סינון לפי שנה</span>
                    <select id="yearSelect" class="w-full rounded-lg border border-slate-300 p-2.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-200">
                        <option value="all">כל השנים</option>
                    </select>
                </label>
            </div>

            <p id="resultsInfo" class="mt-3 text-sm text-slate-500"></p>
        </section>

        <section class="section-card">
            <h3 class="section-header">רשימת פתרונות</h3>
            <div id="solutionsList" class="space-y-3"></div>
        </section>
    </div>

    <div id="hoverPreview" class="hover-preview" aria-hidden="true">
        <img id="hoverPreviewImg" alt="תצוגה מוגדלת של השאלה">
    </div>

    <script>
        const solutions = [
            { year: 1996, question: "1", title: "1996 שאלה 1", href: "./1996 שאלה 1/1996 שאלה 1.html", tags: ["מכניקה", "בגרות", "קינמטיקה", "y(t)", "v(t)"] },
            { year: 1997, question: "1", title: "1997 שאלה 1", href: "./1997 שאלה 1/1997 שאלה.html", tags: ["מכניקה", "בגרות", "קינמטיקה", "גרפים"] },
            { year: 2000, question: "1", title: "2000 שאלה 1", href: "./2000 שאלה 1/2000 שאלה 1.html", tags: ["מכניקה", "בגרות", "תנועה", "חישוב"] },
            { year: 2001, question: "1", title: "2001 שאלה 1", href: "./2001 שאלה 1/2001 שאלה 1.html", tags: ["מכניקה", "בגרות", "תנע", "כוחות"] },
            { year: 2002, question: "1", title: "2002 שאלה 1", href: "./2002 שאלה 1/2002 שאלה 1.html", tags: ["מכניקה", "בגרות", "קינמטיקה", "גרף מהירות-זמן"] },
            { year: 2002, question: "3", title: "2002 שאלה 3", href: "./2002 שאלה 3/2002 שאלה 3.html", tags: ["מכניקה", "בגרות", "התנגשות", "שימור תנע", "זריקה אופקית", "d^2"] },
            { year: 2003, question: "1", title: "2003 שאלה 1", href: "./2003 שאלה 1/2003 שאלה 1.html", tags: ["מכניקה", "בגרות", "זריקה אנכית", "y(t)", "t=0"] },
            { year: 2008, question: "1", title: "2008 שאלה 1", href: "./2008 שאלה 1/2008 שאלה 1.html", tags: ["מכניקה", "בגרות", "כוחות", "שימור אנרגיה"] },
            { year: 2009, question: "2", title: "2009 שאלה 2", href: "./2009 שאלה 2/2009 שאלה 2.html", tags: ["מכניקה", "בגרות", "גרפים", "ניתוח נתונים"] },
            { year: 2010, question: "1", title: "2010 שאלה 1", href: "./2010 שאלה 1/שאלה 2010 שאלה 1.html", tags: ["מכניקה", "בגרות", "קינמטיקה", "יחסית"] },
            { year: 2012, question: "2", title: "2012 שאלה 2", href: "./2012 שאלה 2/2012 שאלה 2.html", tags: ["מכניקה", "בגרות", "כוחות", "אנרגיה"] }
        ];

        const yearSelect = document.getElementById("yearSelect");
        const resultsInfo = document.getElementById("resultsInfo");
        const listEl = document.getElementById("solutionsList");
        const hoverPreview = document.getElementById("hoverPreview");
        const hoverPreviewImg = document.getElementById("hoverPreviewImg");

        let previewActive = false;

        function movePreview(event) {
            if (!previewActive) {
                return;
            }

            const margin = 18;
            const rect = hoverPreview.getBoundingClientRect();
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            let x = event.clientX + margin;
            let y = event.clientY + margin;

            if (x + rect.width > vw - 8) {
                x = event.clientX - rect.width - margin;
            }
            if (y + rect.height > vh - 8) {
                y = event.clientY - rect.height - margin;
            }

            x = Math.max(8, x);
            y = Math.max(8, y);

            hoverPreview.style.left = `${x}px`;
            hoverPreview.style.top = `${y}px`;
        }

        function hidePreview() {
            previewActive = false;
            hoverPreview.style.display = "none";
        }

        function attachThumbnailPreviewHandlers(scope) {
            const thumbs = scope.querySelectorAll(".solution-thumb");
            thumbs.forEach((thumb) => {
                thumb.addEventListener("mouseenter", (event) => {
                    if (window.matchMedia("(max-width: 900px)").matches || !thumb.src) {
                        return;
                    }

                    hoverPreviewImg.src = thumb.src;
                    hoverPreview.style.display = "block";
                    previewActive = true;
                    movePreview(event);
                });

                thumb.addEventListener("mousemove", movePreview);
                thumb.addEventListener("mouseleave", hidePreview);
            });
        }

        function yearOptionsInit() {
            const years = [...new Set(solutions.map((s) => s.year))].sort((a, b) => a - b);
            years.forEach((y) => {
                const opt = document.createElement("option");
                opt.value = String(y);
                opt.textContent = String(y);
                yearSelect.appendChild(opt);
            });
        }

        function render(items) {
            listEl.innerHTML = "";

            if (!items.length) {
                const empty = document.createElement("div");
                empty.className = "empty-state";
                empty.textContent = "לא נמצאו פתרונות התואמים את הסינון. נסה/י מילה אחרת או שנה אחרת.";
                listEl.appendChild(empty);
            } else {
                items.forEach((item) => {
                    const card = document.createElement("article");
                    card.className = "solution-item";

                    const folderPath = item.href.slice(0, item.href.lastIndexOf("/"));
                    const thumbPath = `${folderPath}/question-image.png`;
                    const tags = item.tags.map((t) => `<span class=\"meta-pill\">${t}</span>`).join(" ");

                    card.innerHTML = `
                        <div>
                            <img class="solution-thumb" src="${thumbPath}" alt="תמונה מקדימה - ${item.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="thumb-fallback">אין תמונה מקדימה</div>
                        </div>
                        <div>
                            <a class="solution-link" href="${item.href}">${item.title}</a>
                            <div class="mt-2 text-sm text-slate-600">שנה: <strong>${item.year}</strong> | שאלה: <strong>${item.question}</strong></div>
                            <div class="mt-2">${tags}</div>
                        </div>
                    `;

                    listEl.appendChild(card);
                    attachThumbnailPreviewHandlers(card);
                });
            }

            resultsInfo.textContent = `נמצאו ${items.length} פתרונות.`;
        }

        function runFilter() {
            const yearVal = yearSelect.value;

            const filtered = solutions.filter((s) => {
                const yearOk = yearVal === "all" || String(s.year) === yearVal;
                return yearOk;
            });

            filtered.sort((a, b) => a.year - b.year || Number(a.question) - Number(b.question));
            render(filtered);
        }

        document.addEventListener("DOMContentLoaded", function() {
            const versionStamp = document.getElementById("versionStamp");
            const versionId = document.getElementById("versionId");
            const versionUpdatedAt = document.getElementById("versionUpdatedAt");
            if (versionStamp) {
                versionStamp.title = "Last file modified: " + document.lastModified;
            }

            const modified = new Date(document.lastModified);
            if (!Number.isNaN(modified.getTime())) {
                const pad = (n) => String(n).padStart(2, "0");
                const y = modified.getFullYear();
                const m = pad(modified.getMonth() + 1);
                const d = pad(modified.getDate());
                const hh = pad(modified.getHours());
                const mm = pad(modified.getMinutes());

                if (versionId) {
                    versionId.textContent = `v${y}${m}${d}-${hh}${mm}`;
                }
                if (versionUpdatedAt) {
                    versionUpdatedAt.textContent = `${y}-${m}-${d} ${hh}:${mm}`;
                }
            }

            yearOptionsInit();
            runFilter();

            yearSelect.addEventListener("change", runFilter);
        });
    </script>
</body>
</html>
