<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף בית - Eli Hermes Physics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --ink: #0f172a;
            --muted: #475569;
            --card: #ffffff;
            --stroke: #cbd5e1;
            --brand: #0f766e;
            --brand-2: #0369a1;
            --brand-3: #ea580c;
            --brand-4: #4f46e5;
        }

        body {
            margin: 0;
            font-family: "Rubik", "Segoe UI", Tahoma, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 10%, rgba(14, 165, 233, 0.18), transparent 30%),
                radial-gradient(circle at 92% 90%, rgba(16, 185, 129, 0.16), transparent 32%),
                linear-gradient(120deg, #f8fafc, #eef2ff 50%, #f0fdfa);
            min-height: 100vh;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--stroke);
            border-radius: 1rem;
            padding: 1.15rem;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
        }

        .card-link {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            text-decoration: none;
            color: inherit;
        }

        .dot {
            width: 0.8rem;
            height: 0.8rem;
            border-radius: 9999px;
            flex-shrink: 0;
            margin-top: 0.45rem;
        }

        .accent-reisman { background: var(--brand); }
        .accent-grades { background: var(--brand-2); }
        .accent-electric { background: var(--brand-3); }
        .accent-mechanics { background: var(--brand-4); }

        .sub {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <main class="max-w-4xl mx-auto px-4 py-10 md:py-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-5xl font-bold text-slate-900">דף בית לניווט</h1>
            <p class="mt-3 text-slate-600 text-base md:text-lg">כניסה מהירה למאגרי ההוראה, התרגול והפתרונות</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5" aria-label="Main navigation links">
            <article class="card">
                <a class="card-link" href="./הדגמות מרכז שרווץ רייסמן מכון ויצמן/index.html">
                    <span class="dot accent-reisman" aria-hidden="true"></span>
                    <span>
                        <strong class="text-lg">הדגמות רייסמן</strong>
                        <span class="sub block">בחירה בין חשמל, מכניקה או ניהול</span>
                    </span>
                </a>
            </article>

            <article class="card">
                <a class="card-link" href="./חישובי ציונים/מחצית 2 תשפו.html">
                    <span class="dot accent-grades" aria-hidden="true"></span>
                    <span>
                        <strong class="text-lg">חישובי ציונים</strong>
                        <span class="sub block">מחולל חישוב ציוני מחצית</span>
                    </span>
                </a>
            </article>

            <article class="card">
                <a class="card-link" href="./פתרונות שאלות בגרות/חשמל שאלות בגרות/תפריט ראשי חשמל.html">
                    <span class="dot accent-electric" aria-hidden="true"></span>
                    <span>
                        <strong class="text-lg">תפריט ראשי חשמל</strong>
                        <span class="sub block">ריכוז פתרונות בגרות בחשמל</span>
                    </span>
                </a>
            </article>

            <article class="card">
                <a class="card-link" href="./פתרונות שאלות בגרות/מכניקה שאלות בגרות/תפריט ראשי מכניקה.html">
                    <span class="dot accent-mechanics" aria-hidden="true"></span>
                    <span>
                        <strong class="text-lg">תפריט ראשי מכניקה</strong>
                        <span class="sub block">ריכוז פתרונות בגרות במכניקה</span>
                    </span>
                </a>
            </article>
        </section>
    </main>
</body>
</html>
