<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>סימולציית קפיץ ואנרגיה | מותאם לנייד</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for the Graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { 
            font-family: 'Rubik', sans-serif; 
            background-color: #f3f4f6; 
        }
        canvas { cursor: crosshair; }
        
        /* Sliders styling for better mobile touch */
        input[type=range] { 
            width: 100%; 
            cursor: pointer; 
            height: 1.5rem; /* Larger touch area */
        }
        
        /* MathJax text forcing direction */
        .dir-ltr { direction: ltr; display: inline-block; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen md:h-screen md:overflow-hidden">

    <!-- Visualization Column (Simulation + Graph) -->
    <!-- On mobile: natural height. On desktop: takes remaining width and full height -->
    <div class="flex-1 flex flex-col w-full h-[80vh] md:h-full relative order-1 md:order-none">
        
        <!-- Simulation Area (Top) -->
        <!-- Takes more space naturally, but at least 40vh on mobile -->
        <div class="flex-1 relative bg-gray-50 border-b border-gray-300 min-h-[40vh] md:min-h-0 flex flex-col">
            <h1 class="absolute top-2 right-3 md:right-4 text-lg md:text-xl font-bold text-gray-700 pointer-events-none z-10 opacity-70 bg-white/50 px-2 rounded">
                סימולציית הקפיץ
            </h1>
            <div class="flex-1 relative w-full h-full">
                <canvas id="simCanvas" class="w-full h-full block absolute inset-0"></canvas>
            </div>
        </div>

        <!-- Graph Area (Bottom) -->
        <div class="h-[35vh] md:h-1/3 bg-white p-2 md:p-3 relative flex flex-col border-b md:border-b-0 border-gray-300">
            <h3 class="text-xs md:text-sm text-gray-600 font-bold mb-1 mr-1">גרף לינאריזציה: $H$ כתלות ב-$(\Delta x)^2$</h3>
            <div class="flex-1 relative w-full h-full min-h-[100px]">
                <canvas id="graphCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Controls & Data Panel (Sidebar/Bottom) -->
    <!-- On mobile: appears below graph. On desktop: fixed width sidebar on the left side (RTL) -->
    <div class="w-full md:w-80 lg:w-96 bg-white border-t md:border-t-0 md:border-r border-gray-200 p-4 flex flex-col shadow-xl z-20 order-2 md:order-none md:overflow-y-auto">
        
        <div class="mb-4 border-b pb-4">
            <h2 class="text-xl md:text-lg font-bold text-gray-800 mb-4 md:mb-2">לוח בקרה</h2>
            
            <!-- Mass Control -->
            <div class="mb-3">
                <label class="block text-sm md:text-xs font-medium text-gray-700 mb-1 flex justify-between">
                    <span>מסת כדור ($m$):</span>
                    <span id="mValueDisplay" class="font-bold text-purple-600 dir-ltr">0.20 kg</span> 
                </label>
                <input type="range" id="mSlider" min="0.05" max="0.5" step="0.01" value="0.2" oninput="updateSettings()" class="accent-purple-600">
            </div>

            <!-- Spring Constant Control -->
            <div class="mb-3">
                <label class="block text-sm md:text-xs font-medium text-gray-700 mb-1 flex justify-between">
                    <span>קבוע קפיץ ($k$):</span>
                    <span id="kValueDisplay" class="font-bold text-blue-600 dir-ltr">100 N/m</span>
                </label>
                <input type="range" id="kSlider" min="50" max="200" step="5" value="100" oninput="updateSettings()" class="accent-blue-600">
            </div>

            <p class="text-[11px] md:text-[10px] text-red-500 font-bold mb-2 hidden bg-red-50 p-1 rounded text-center border border-red-200" id="resetWarning">
                שינוי פרמטרים מאפס את הטבלה!
            </p>

            <!-- Compression Control -->
            <div class="mb-4">
                <label class="block text-sm md:text-xs font-medium text-gray-700 mb-1 flex justify-between">
                    <span>כיווץ הקפיץ ($\Delta x$):</span>
                    <span id="xValueDisplay" class="font-bold text-green-600 dir-ltr">0.15 m</span>
                </label>
                <input type="range" id="xSlider" min="0.05" max="0.40" step="0.01" value="0.15" oninput="updateSettings()" class="accent-green-600">
            </div>

            <div class="flex gap-2 mt-2">
                <button onclick="launchBall()" id="launchBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 md:py-2 px-4 rounded text-base md:text-sm transition shadow">
                    שגר כדור!
                </button>
                <button onclick="resetSim()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 md:py-2 px-4 rounded text-base md:text-sm transition">
                    איפוס
                </button>
            </div>
        </div>

        <!-- Data Table -->
        <!-- Fixed minimum height for mobile to scroll inside, takes remaining space on desktop -->
        <div class="flex flex-col min-h-[250px] md:min-h-[150px] md:flex-1">
            <div class="flex justify-between items-center mb-2 md:mb-1">
                <h3 class="font-bold text-gray-700 text-sm md:text-xs">טבלת מדידות</h3>
                <button onclick="clearTable()" class="text-sm md:text-xs text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded">נקה נתונים</button>
            </div>
            <div class="overflow-y-auto border border-gray-200 rounded flex-1 bg-white shadow-inner">
                <table class="w-full text-sm md:text-xs text-center">
                    <thead class="bg-gray-100 text-gray-600 sticky top-0 shadow-sm">
                        <tr>
                            <th class="p-2 border-b">#</th>
                            <th class="p-2 border-b">$\Delta x$ (m)</th>
                            <th class="p-2 border-b">$H$ (m)</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable" class="bg-white">
                        <!-- Data rows will appear here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- Physics Constants ---
        const GRAVITY = 10; 
        
        // --- Global State ---
        let state = {
            m: 0.2,
            k: 100,
            dx: 0.15,
            isAnimating: false,
            ballY: 0, 
            ballV: 0,
            maxHeightReached: 0,
            peakRecorded: false,
            phase: 'idle', 
            pixelsPerMeter: 300, 
            groundY: 0,
            springRestLengthPixels: 150,
            experimentCount: 0
        };

        // --- Canvas Setup ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- Chart Setup (Chart.js) ---
        let resultChart;
        function initChart() {
            const ctxGraph = document.getElementById('graphCanvas').getContext('2d');
            resultChart = new Chart(ctxGraph, {
                data: {
                    datasets: [{
                        type: 'scatter',
                        label: 'תוצאות הניסוי',
                        data: [],
                        backgroundColor: 'rgba(37, 99, 235, 1)',
                        borderColor: 'rgba(37, 99, 235, 1)',
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }, {
                        type: 'line',
                        label: 'קו מגמה',
                        data: [],
                        borderColor: 'rgba(239, 68, 68, 0.8)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            title: { display: true, text: 'ריבוע הכיווץ (דלתא x בריבוע)' },
                            min: 0
                        },
                        y: {
                            title: { display: true, text: 'גובה מקסימלי H [m]' },
                            min: 0
                        }
                    },
                    plugins: {
                        legend: { 
                            display: true, 
                            labels: { boxWidth: 10, usePointStyle: true, font: { family: 'Rubik' } } 
                        },
                        tooltip: {
                            bodyFont: { family: 'Rubik' },
                            titleFont: { family: 'Rubik' }
                        }
                    }
                }
            });
        }

        // --- Trendline Calculation ---
        function updateTrendline() {
            const dataPoints = resultChart.data.datasets[0].data;
            if (dataPoints.length <= 2) {
                resultChart.data.datasets[1].data = [];
                return;
            }

            let n = dataPoints.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

            for (let i = 0; i < n; i++) {
                const x = dataPoints[i].x;
                const y = dataPoints[i].y;
                sumX += x;
                sumY += y;
                sumXY += x * y;
                sumXX += x * x;
            }

            const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;

            const minX = 0; 
            const maxX = dataPoints[dataPoints.length - 1].x; 

            resultChart.data.datasets[1].data = [
                { x: minX, y: intercept + slope * minX },
                { x: maxX, y: intercept + slope * maxX }
            ];
        }

        // --- Core Functions ---

        function resize() {
            // Re-calc canvas dimensions to match its CSS responsive size
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            // Smart Zoom: Adjust scale based on screen height for better visibility on mobile
            if (canvas.height < 350) {
                state.pixelsPerMeter = 180; 
                state.springRestLengthPixels = 90;
            } else if (canvas.height < 500) {
                state.pixelsPerMeter = 240; 
                state.springRestLengthPixels = 120;
            } else {
                state.pixelsPerMeter = 300;
                state.springRestLengthPixels = 150;
            }
            
            state.groundY = canvas.height - 30;
            draw();
        }
        window.addEventListener('resize', resize);

        function init() {
            initChart();
            resize();
            updateSettings(); 
            draw();
        }

        function updateSettings() {
            if (state.isAnimating) return; 
            
            const newM = parseFloat(document.getElementById('mSlider').value);
            const newK = parseInt(document.getElementById('kSlider').value);
            const newDx = parseFloat(document.getElementById('xSlider').value);
            
            let experimentParamsChanged = false;
            if (newK !== state.k || newM !== state.m) {
                experimentParamsChanged = true;
                state.k = newK;
                state.m = newM;
                document.getElementById('kValueDisplay').innerText = state.k + ' N/m';
                document.getElementById('mValueDisplay').innerText = state.m.toFixed(2) + ' kg';
                clearTable(); 
            }

            const warning = document.getElementById('resetWarning');
            if (warning) {
                warning.style.display = experimentParamsChanged ? 'block' : 'none';
                if(experimentParamsChanged) setTimeout(() => { warning.style.display = 'none'; }, 2500);
            }

            state.dx = newDx;
            document.getElementById('xValueDisplay').innerText = state.dx.toFixed(2) + ' m';
            
            state.phase = 'idle';
            state.peakRecorded = false;
            state.ballY = -state.dx * state.pixelsPerMeter; 
            
            draw();
        }

        function resetSim() {
            state.isAnimating = false;
            state.peakRecorded = false;
            state.phase = 'idle';
            state.ballY = -state.dx * state.pixelsPerMeter;
            draw();
        }

        function clearTable() {
            document.getElementById('resultsTable').innerHTML = '';
            state.experimentCount = 0;
            resultChart.data.datasets[0].data = [];
            resultChart.data.datasets[1].data = []; 
            resultChart.update();
        }

        function launchBall() {
            if (state.isAnimating) return;
            
            state.isAnimating = true;
            state.peakRecorded = false;
            state.phase = 'moving';
            state.ballV = 0; 
            
            const dt = 0.016; 
            const startY = -state.dx * state.pixelsPerMeter;
            
            function loop() {
                if (!state.isAnimating) return;
                
                let currentPosMeters = state.ballY / state.pixelsPerMeter;
                
                let gravity = -state.m * GRAVITY;
                let springF = 0;
                
                if (currentPosMeters < 0) {
                    springF = -state.k * currentPosMeters;
                }
                
                let a = (springF + gravity) / state.m;
                
                state.ballV += a * dt;
                let dy = state.ballV * dt * state.pixelsPerMeter;
                state.ballY += dy;
                
                // Peak Detection
                if (state.ballV < 0 && !state.peakRecorded && state.ballY > startY) {
                    state.peakRecorded = true;
                    const theoreticalH = (state.k * Math.pow(state.dx, 2)) / (2 * state.m * GRAVITY);
                    state.maxHeightReached = theoreticalH; 
                    addResult(state.dx, state.maxHeightReached);
                }
                
                // Stop at bottom
                if (state.ballY <= startY && state.ballV < 0) {
                     state.ballY = startY;
                     state.isAnimating = false;
                     state.phase = 'idle';
                     draw();
                     return;
                }

                draw();
                requestAnimationFrame(loop);
            }
            
            requestAnimationFrame(loop);
        }

        function addResult(dx, h) {
            state.experimentCount++;
            
            const tbody = document.getElementById('resultsTable');
            const row = document.createElement('tr');
            row.className = "hover:bg-blue-50 transition border-b border-gray-100";
            row.innerHTML = `
                <td class="p-2 font-bold text-gray-500">${state.experimentCount}</td>
                <td class="p-2 dir-ltr text-gray-800">${dx.toFixed(2)}</td>
                <td class="p-2 font-bold text-blue-600 dir-ltr">${h.toFixed(3)}</td>
            `;
            tbody.insertBefore(row, tbody.firstChild);

            const dxSquared = dx * dx;
            resultChart.data.datasets[0].data.push({ x: dxSquared, y: h });
            resultChart.data.datasets[0].data.sort((a, b) => a.x - b.x);
            
            updateTrendline();
            resultChart.update();
        }

        // --- Drawing Logic ---

        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Adjust X center dynamically - shift slightly left on narrow screens to make room for ruler
            const centerX = canvas.width > 400 ? canvas.width / 2 : canvas.width / 2 + 20; 
            const groundY = state.groundY;
            const releaseLevelY = groundY - state.springRestLengthPixels; 
            
            const rulerOffset = canvas.width > 400 ? 80 : 60;
            drawRuler(centerX - rulerOffset, releaseLevelY);

            // Reference Lines
            ctx.beginPath();
            ctx.strokeStyle = "#ccc";
            ctx.setLineDash([5, 5]);
            ctx.moveTo(centerX - 80, releaseLevelY);
            ctx.lineTo(centerX + 80, releaseLevelY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = "#999";
            ctx.font = "12px Rubik";
            ctx.fillText("0", centerX + 85, releaseLevelY + 4);

            const compressionY = releaseLevelY + (state.dx * state.pixelsPerMeter);
            ctx.beginPath();
            ctx.strokeStyle = "#10b981"; 
            ctx.setLineDash([2, 2]);
            ctx.moveTo(centerX - 80, compressionY);
            ctx.lineTo(centerX + 80, compressionY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            if (!state.isAnimating && Math.abs(state.ballY - (-state.dx * state.pixelsPerMeter)) < 1) {
                ctx.fillStyle = "#059669";
                ctx.fillText("התחלה", centerX + 85, compressionY + 4);
            }

            const ballVisualY = releaseLevelY - state.ballY;
            const ballRadius = canvas.width > 400 ? 15 : 12; // Responsive ball size
            
            // Draw Spring
            let springVisualTop;
            if (state.ballY > 0) {
                springVisualTop = releaseLevelY + ballRadius; 
            } else {
                springVisualTop = ballVisualY + ballRadius; 
            }
            drawSpring(centerX, groundY, springVisualTop, 18);

            // Draw Ball
            ctx.beginPath();
            ctx.arc(centerX, ballVisualY, ballRadius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(centerX - ballRadius/3, ballVisualY - ballRadius/3, 2, centerX, ballVisualY, ballRadius);
            grad.addColorStop(0, "#60a5fa");
            grad.addColorStop(1, "#2563eb");
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = "#1e40af";
            ctx.stroke();

            // Draw Peak Marker
            if (state.peakRecorded) {
                const peakYFromRelease = state.maxHeightReached - state.dx;
                const peakVisualY = releaseLevelY - (peakYFromRelease * state.pixelsPerMeter);

                ctx.beginPath();
                ctx.strokeStyle = "rgba(255, 0, 0, 0.6)";
                ctx.lineWidth = 2;
                ctx.moveTo(centerX - 50, peakVisualY);
                ctx.lineTo(centerX + 50, peakVisualY);
                ctx.stroke();
                
                ctx.fillStyle = "rgba(220, 0, 0, 0.9)";
                ctx.font = "bold 13px Rubik";
                ctx.fillText(`${state.maxHeightReached.toFixed(3)}m`, centerX + 55, peakVisualY + 4);
            }
        }

        function drawSpring(x, bottomY, topY, width) {
            ctx.beginPath();
            ctx.strokeStyle = "#4b5563";
            ctx.lineWidth = 3;
            ctx.lineJoin = "round";
            
            const height = bottomY - topY;
            const coils = 10;
            const coilHeight = height / coils;
            
            ctx.moveTo(x, bottomY);
            for (let i = 0; i < coils; i++) {
                const cy = bottomY - (i * coilHeight);
                ctx.lineTo(x - width, cy - coilHeight * 0.25);
                ctx.lineTo(x + width, cy - coilHeight * 0.75);
                ctx.lineTo(x, cy - coilHeight);
            }
            ctx.stroke();
            
            // Base
            ctx.beginPath();
            ctx.moveTo(x - 20, bottomY);
            ctx.lineTo(x + 20, bottomY);
            ctx.lineWidth = 5;
            ctx.strokeStyle = "#1f2937";
            ctx.stroke();
        }

        function drawRuler(x, zeroY) {
            ctx.fillStyle = "#6b7280";
            ctx.strokeStyle = "#6b7280";
            ctx.lineWidth = 1;
            ctx.font = "11px sans-serif";
            
            ctx.beginPath();
            ctx.moveTo(x, zeroY + 600);
            ctx.lineTo(x, zeroY - 1200); // Allow high jumps
            ctx.stroke();
            
            for (let m = -1.0; m <= 4.0; m += 0.1) {
                const val = Math.round(m * 10) / 10;
                const y = zeroY - (val * state.pixelsPerMeter);
                if (y > state.groundY) continue;
                if (y < -50) continue; // Out of view optimization
                
                const isHalfOrWhole = Math.abs(val % 0.5) < 0.01;
                const tickLen = isHalfOrWhole ? 12 : 6; 
                
                ctx.beginPath();
                ctx.moveTo(x - tickLen, y);
                ctx.lineTo(x, y);
                ctx.stroke();
                
                if (isHalfOrWhole) {
                    ctx.fillText(val.toFixed(1), x - 32, y + 4);
                }
            }
        }

        // Initialize when DOM is ready
        window.addEventListener('DOMContentLoaded', () => {
            // Add a small delay for proper CSS container sizing
            setTimeout(init, 100);
        });
    </script>
</body>
</html>
