<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתכונת מכניקה 260508</title>
    <style>
        :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --surface-alt: #f8fafc;
            --text: #162033;
            --muted: #5a6880;
            --accent: #1d4ed8;
            --accent-dark: #153a9f;
            --border: #d7dfec;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans Hebrew", Arial, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(29, 78, 216, 0.08), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .page {
            width: min(960px, calc(100% - 32px));
            margin: 36px auto;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 32px 28px 28px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(30px, 5vw, 42px);
            line-height: 1.1;
        }

        .subtitle {
            margin: 0 0 26px;
            color: var(--muted);
            font-size: 18px;
        }

        .links {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .link-card {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            text-decoration: none;
            color: inherit;
            background: linear-gradient(180deg, var(--surface) 0%, var(--surface-alt) 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 18px 16px;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: rgba(29, 78, 216, 0.35);
            box-shadow: 0 14px 26px rgba(29, 78, 216, 0.10);
        }

        .num {
            flex: 0 0 auto;
            width: 38px;
            height: 38px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(29, 78, 216, 0.10);
            color: var(--accent-dark);
            font-weight: 700;
            font-size: 18px;
        }

        .card-text {
            min-width: 0;
        }

        .topic {
            display: block;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .source {
            display: block;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.45;
        }

        .footer-note {
            margin: 22px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        @media (max-width: 720px) {
            .page {
                width: min(100% - 20px, 960px);
                margin: 18px auto;
                padding: 22px 16px 18px;
                border-radius: 20px;
            }

            .links {
                grid-template-columns: 1fr;
            }

            .topic {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <h1>מתכונת מכניקה 260508</h1>
        <p class="subtitle">תפריט סטטי עם קישורים לפתרונות שש השאלות.</p>

        <ul class="links">
            <li>
                <a class="link-card" href="קינמטיקה/שאלת קינמטיקה על בסיס בר ציון 2021/שאלת קינמטיקה על בסיס בר ציון 2021.html">
                    <span class="num">1</span>
                    <span class="card-text">
                        <span class="topic">קינמטיקה</span>
                    </span>
                </a>
            </li>
            <li>
                <a class="link-card" href="דינמיקה/שאלה עם שרטוט גרף על בסיס ליאו בק 2020/דינמיקה על בסיס לאו בק 2020.html">
                    <span class="num">2</span>
                    <span class="card-text">
                        <span class="topic">דינמיקה</span>
                    </span>
                </a>
            </li>
            <li>
                <a class="link-card" href="תנועה מעגלית/שאלה על בסיס מתכונת 2019 מקיף ראשון/תנועה מעגלית אנכית.html">
                    <span class="num">3</span>
                    <span class="card-text">
                        <span class="topic">מעגלית</span>
                    </span>
                </a>
            </li>
            <li>
                <a class="link-card" href="מתקף ותנע/שאלת מתקף על בסיס תיכון הדרים 2019/שאלת מתקף על בסיס תיכון הדרים 2019.html">
                    <span class="num">4</span>
                    <span class="card-text">
                        <span class="topic">מתקף</span>
                    </span>
                </a>
            </li>
            <li>
                <a class="link-card" href="אנרגיות/שאלת אנרגיה ומעגלית על בסיס תיכון עתיד 2019/שאלת אנרגיה ומעגלית על בסיס תיכון עתיד 2019.html">
                    <span class="num">5</span>
                    <span class="card-text">
                        <span class="topic">אנרגיות</span>
                    </span>
                </a>
            </li>
            <li>
                <a class="link-card" href="כבידה/שאלת כבידה על בסיס תיכון הדרים 2019/שאלת כבידה על בסיס תיכון הדרים 2019.html">
                    <span class="num">6</span>
                    <span class="card-text">
                        <span class="topic">כבידה</span>
                    </span>
                </a>
            </li>
        </ul>

        <p class="footer-note">הקישורים מובילים ישירות לדפי הפתרון של השאלות, לפי סדר המתכונת.</p>
    </main>
</body>
</html>
