<!doctype html>
<html lang="he" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>תפריט כלי AI</title>
	<style>
		:root {
			--bg1: #f0f9ff;
			--bg2: #ecfeff;
			--card: #ffffff;
			--text: #0f172a;
			--muted: #475569;
			--accent: #0ea5e9;
			--accent-2: #0891b2;
			--border: #bae6fd;
			--shadow: 0 12px 30px rgba(2, 132, 199, 0.16);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Assistant", "Heebo", "Noto Sans Hebrew", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 12% 12%, #dbeafe 0%, transparent 28%),
				radial-gradient(circle at 90% 10%, #cffafe 0%, transparent 34%),
				linear-gradient(145deg, var(--bg1), var(--bg2));
			min-height: 100vh;
			padding: 20px;
		}

		.wrap {
			max-width: 840px;
			margin: 0 auto;
		}

		.hero {
			background: linear-gradient(135deg, #0ea5e9, #0891b2);
			color: white;
			border-radius: 18px;
			padding: 20px;
			box-shadow: var(--shadow);
			margin-bottom: 18px;
		}

		.hero h1 {
			margin: 0 0 8px;
			font-size: 1.45rem;
			line-height: 1.25;
		}

		.hero p {
			margin: 0;
			opacity: 0.95;
			line-height: 1.45;
		}

		.status {
			margin: 0 0 16px;
			color: var(--muted);
			font-size: 0.95rem;
		}

		.tools-grid {
			display: grid;
			gap: 12px;
			grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
		}

		.tool-card {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 14px;
			box-shadow: 0 6px 16px rgba(14, 116, 144, 0.08);
			display: flex;
			flex-direction: column;
			gap: 10px;
			animation: fadeIn 300ms ease;
		}

		.tool-card h3 {
			margin: 0;
			font-size: 1.1rem;
			line-height: 1.3;
		}

		.tool-card p {
			margin: 0;
			color: var(--muted);
			line-height: 1.45;
			flex: 1;
		}

		.tool-card a {
			align-self: flex-start;
			text-decoration: none;
			background: linear-gradient(135deg, var(--accent), var(--accent-2));
			color: #fff;
			border-radius: 999px;
			padding: 8px 14px;
			font-weight: 700;
			font-size: 0.95rem;
			transition: transform 120ms ease, filter 120ms ease;
		}

		.tool-card a:hover {
			transform: translateY(-1px);
			filter: brightness(1.05);
		}

		.empty-box {
			background: #fff;
			border: 1px dashed #7dd3fc;
			border-radius: 12px;
			padding: 14px;
			color: var(--muted);
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(6px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>
<body>
	<main class="wrap">
		<section class="hero">
			<h1>תפריט מהיר לכלי ה-AI שלך</h1>
			<p>התפריט נטען דינאמית מהקובץ tools.json. כל עדכון לקובץ יתעדכן כאן אוטומטית בטעינה מחדש.</p>
		</section>

		<p id="status" class="status">טוען כלים...</p>
		<section id="toolsGrid" class="tools-grid" aria-live="polite"></section>
	</main>

	<script>
		function buildToolCard(tool) {
			const card = document.createElement("article");
			card.className = "tool-card";

			const title = document.createElement("h3");
			title.textContent = tool.שם || "כלי ללא שם";

			const desc = document.createElement("p");
			desc.textContent = tool.תיאור || "אין תיאור";

			const link = document.createElement("a");
			link.href = tool.קישור || "#";
			link.textContent = "פתיחת כלי";
			link.target = "_blank";
			link.rel = "noopener noreferrer";

			card.append(title, desc, link);
			return card;
		}

		function showMessage(container, message) {
			const box = document.createElement("div");
			box.className = "empty-box";
			box.textContent = message;
			container.appendChild(box);
		}

		async function loadToolsMenu() {
			const status = document.getElementById("status");
			const grid = document.getElementById("toolsGrid");

			try {
				const response = await fetch("./tools.json", { cache: "no-store" });
				if (!response.ok) {
					throw new Error("JSON request failed");
				}

				const data = await response.json();
				const tools = Array.isArray(data.כלים) ? data.כלים : [];

				grid.innerHTML = "";

				if (!tools.length) {
					status.textContent = "לא נמצאו כלים כרגע.";
					showMessage(grid, "הקובץ tools.json נטען, אבל מערך הכלים ריק.");
					return;
				}

				tools.forEach((tool) => {
					grid.appendChild(buildToolCard(tool));
				});

				status.textContent = `נטענו ${tools.length} כלים.`;
			} catch (error) {
				grid.innerHTML = "";
				status.textContent = "לא ניתן לטעון את רשימת הכלים.";
				showMessage(grid, "בדוק שהקובץ tools.json קיים באותה תיקיה ושהוא JSON תקין.");
				console.error("Failed to load tools menu:", error);
			}
		}

		document.addEventListener("DOMContentLoaded", loadToolsMenu);
	</script>
</body>
</html>
