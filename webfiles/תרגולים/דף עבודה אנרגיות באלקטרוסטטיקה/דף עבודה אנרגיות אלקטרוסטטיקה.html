                    'הפוטנציאל שלו משתווה לאפס (פוטנציאל האדמה).',
                    'הוא תמיד מקבל אלקטרונים מהאדמה.',
                    'הוא תמיד מוסר אלקטרונים לאדמה.'
                ],
                correctAnswer: 1,
                hint: 'כדור הארץ משמש כמקור קיבול עצום ונקודת ייחוס של אפס וולט. הארקה גורמת לשוויון פוטנציאלים עם האדמה.'
            }
        ];

        // State variables
        let studentName = '';
        let studentClass = '';
        let currentScore = 0;
        let questionsState = questionsData.map(q => ({
            ...q,
            attempts: 0,
            status: 'unanswered', // unanswered, correct_first, correct_second, incorrect
            earnedPoints: 0
        }));

        const POINTS_PER_QUESTION = 100 / questionsData.length;

        // Start Quiz Function
        function startQuiz() {
            const nameInput = document.getElementById('student-name').value.trim();
            const classInput = document.getElementById('student-class').value.trim();

            if (!nameInput || !classInput) {
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }

            studentName = nameInput;
            studentClass = classInput;

            document.getElementById('display-name').textContent = studentName;
            document.getElementById('display-class').textContent = studentClass;

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');

            renderQuestions();
        }

        // Render Questions
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            questionsState.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card bg-white rounded-xl shadow p-6 mb-6 border border-gray-200';
                card.id = `question-card-${index}`;

                let html = `<div class="font-semibold text-lg mb-4">שאלה ${index + 1}: <span class="font-normal block mt-1">${q.text}</span></div>`;

                if (q.type === 'mcq') {
                    html += `<div class="space-y-3" id="options-${index}">`;
                    q.options.forEach((opt, optIndex) => {
                        html += `
                            <label class="flex items-center space-x-3 space-x-reverse cursor-pointer p-2 rounded hover:bg-gray-50 transition">
                                <input type="radio" name="q-${index}" value="${optIndex}" class="form-radio h-5 w-5 text-blue-600">
                                <span class="math-content">${opt}</span>
                            </label>
                        `;
                    });
                    html += `</div>`;
                } else if (q.type === 'open') {
                    html += `
                        <div class="mt-2" id="options-${index}">
                            <input type="text" id="open-q-${index}" class="w-full md:w-1/2 border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 text-left" dir="ltr" placeholder="הכנס תשובה מספרית...">
                        </div>
                    `;
                }

                html += `
                    <div class="mt-5 flex items-center justify-between">
                        <button id="btn-check-${index}" onclick="checkAnswer(${index})" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded transition">בדוק תשובה</button>
                        <span id="feedback-${index}" class="font-medium text-sm px-3 py-1 rounded hidden w-full ml-4"></span>
                    </div>
                `;

                card.innerHTML = html;
                container.appendChild(card);
            });

            // Re-render LaTeX carefully
            if (window.MathJax && window.MathJax.typesetPromise) {
                // Clear any previous typesetting state for this container
                MathJax.typesetClear([container]);
                // Promise-based typeset
                MathJax.typesetPromise([container]).catch(function (err) {
                    console.error('MathJax rendering failed: ' + err.message);
                });
            }
        }

        // Check Answer Function
        function checkAnswer(index) {
            const q = questionsState[index];
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const cardEl = document.getElementById(`question-card-${index}`);
            const btnEl = document.getElementById(`btn-check-${index}`);
            
            let userAnswer = null;

            if (q.type === 'mcq') {
                const selected = document.querySelector(`input[name="q-${index}"]:checked`);
                if (!selected) {
                    alert('אנא בחרו תשובה לפני הבדיקה.');
                    return;
                }
                userAnswer = parseInt(selected.value);
            } else if (q.type === 'open') {
                const inputVal = document.getElementById(`open-q-${index}`).value.trim();
                if (inputVal === '') {
                    alert('אנא הזינו תשובה לפני הבדיקה.');
                    return;
                }
                userAnswer = inputVal;
            }

            q.attempts++;
            let isCorrect = false;

            if (q.type === 'mcq') {
                isCorrect = (userAnswer === q.correctAnswer);
            } else if (q.type === 'open') {
                // strict string comparison for numeric strings
                isCorrect = (userAnswer === q.correctAnswer);
            }

            feedbackEl.classList.remove('hidden');

            if (isCorrect) {
                if (q.attempts === 1) {
                    q.status = 'correct_first';
                    q.earnedPoints = POINTS_PER_QUESTION;
                    feedbackEl.innerHTML = 'תשובה נכונה! (+5 נק\')';
                    cardEl.classList.add('correct-bg');
                } else {
                    q.status = 'correct_second';
                    q.earnedPoints = POINTS_PER_QUESTION / 2;
                    feedbackEl.innerHTML = 'תשובה נכונה בניסיון שני! (+2.5 נק\')';
                    cardEl.classList.add('half-bg');
                }
                feedbackEl.className = `font-medium text-sm px-4 py-2 rounded text-green-800 bg-green-200 block mt-2 w-full`;
                disableQuestion(index);
                updateScore();
            } else {
                if (q.attempts === 1) {
                    // Injecting hint on first failed attempt
                    feedbackEl.innerHTML = `תשובה שגויה. נסו שוב! (נותר ניסיון אחד)<br><span class="text-sm font-normal text-orange-900 mt-2 block">💡 <strong>רמז:</strong> ${q.hint}</span>`;
                    feedbackEl.className = `font-medium text-sm px-4 py-3 rounded text-orange-800 bg-orange-100 block mt-2 w-full border border-orange-200`;
                    btnEl.textContent = 'בדוק שוב';
                } else {
                    q.status = 'incorrect';
                    q.earnedPoints = 0;
                    
                    let correctAnswerText = q.type === 'mcq' ? q.options[q.correctAnswer] : q.correctAnswer;
                    feedbackEl.innerHTML = `שגוי. התשובה הנכונה היא: <strong class="mr-1 math-content">${correctAnswerText}</strong>`;
                    feedbackEl.className = `font-medium text-sm px-4 py-2 rounded text-red-800 bg-red-200 block mt-2 w-full`;
                    cardEl.classList.add('wrong-bg');
                    disableQuestion(index);
                    
                    // Retypeset just in case the correct answer contains math
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        MathJax.typesetPromise([feedbackEl]);
                    }
                }
            }
        }

        function disableQuestion(index) {
            const q = questionsState[index];
            document.getElementById(`btn-check-${index}`).disabled = true;
            document.getElementById(`btn-check-${index}`).classList.add('opacity-50', 'cursor-not-allowed');
            
            if (q.type === 'mcq') {
                const radios = document.querySelectorAll(`input[name="q-${index}"]`);
                radios.forEach(r => r.disabled = true);
            } else {
                document.getElementById(`open-q-${index}`).disabled = true;
            }
        }

        function updateScore() {
            currentScore = questionsState.reduce((sum, q) => sum + q.earnedPoints, 0);
            document.getElementById('score-display').textContent = currentScore;
        }

        // Print & Finish function
        function printAndFinish() {
            // Calculate final score if there are unanswered questions
            updateScore();
            
            const printWindow = window.open('', '_blank');
            if (!printWindow) {
                alert('הדפדפן חסם את פתיחת החלון. אנא אשרו פתיחת חלונות קופצים (Pop-ups) עבור אתר זה.');
                return;
            }

            let htmlString = `
            <!DOCTYPE html>
            <html lang="he" dir="rtl">
            <head>
                <meta charset="UTF-8">
                <title>דוח מבדק - אנרגיה ופוטנציאל</title>
                <!-- Configure MathJax for the Print Window -->
                <script>
                    window.MathJax = {
                        tex: {
                            inlineMath: [['\\\\(', '\\\\)'], ['$', '$']],
                            displayMath: [['\\\\[', '\\\\]'], ['$$', '$$']]
                        },
                        startup: {
                            // Hook into the pageReady event to ONLY print after rendering is fully complete
                            pageReady: function () {
                                return MathJax.startup.defaultPageReady().then(function () {
                                    // Give browser half a second to paint the SVG elements
                                    setTimeout(function() {
                                        window.print();
                                        // window.close(); - הוסר כדי לאפשר צילום מסך
                                    }, 500);
                                });
                            }
                        }
                    };
                <\/script>
                <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>
                <style>
                    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 30px; line-height: 1.6; color: #333; }
                    .header { border-bottom: 2px solid #2563eb; padding-bottom: 10px; margin-bottom: 20px; }
                    h1 { color: #1e3a8a; font-size: 24px; margin-bottom: 5px; }
                    .info { font-size: 18px; font-weight: bold; margin-bottom: 20px;}
                    .score { font-size: 22px; color: #2563eb; font-weight: bold; }
                    .q-block { margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; page-break-inside: avoid; }
                    .q-text { font-weight: bold; margin-bottom: 5px; }
                    .status-correct { color: #15803d; font-weight: bold; }
                    .status-half { color: #b45309; font-weight: bold; }
                    .status-wrong { color: #b91c1c; font-weight: bold; }
                    .status-unanswered { color: #6b7280; font-weight: bold; }
                    .MathJax { direction: ltr !important; }
                    @media print {
                        .no-print { display: none !important; }
                    }
                </style>
            </head>
            <body>
                <div class="no-print" style="background-color: #fef3c7; color: #92400e; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #f59e0b; font-weight: bold;">
                    הדפסה ל-PDF לא עבדה? אין בעיה, ניתן לצלם את המסך הזה. <br><span style="font-weight: normal; font-size: 14px;">(אפשר לסגור את החלון הזה באופן ידני בסיום)</span>
                </div>
                <div class="header">
                    <h1>דוח מבדק אינטראקטיבי: אנרגיות ופוטנציאל חשמלי</h1>
                </div>
                <div class="info">
                    תלמיד/ה: ${studentName} | כיתה: ${studentClass} <br>
                    <span class="score">ציון סופי: ${currentScore} / 100</span>
                </div>
                
                <h3>פירוט תשובות:</h3>
            `;

            questionsState.forEach((q, i) => {
                let statusClass = 'status-unanswered';
                let statusText = 'לא נענה';
                
                if (q.status === 'correct_first') { statusClass = 'status-correct'; statusText = 'נכון (ניסיון ראשון, 5 נק\')'; }
                if (q.status === 'correct_second') { statusClass = 'status-half'; statusText = 'נכון (ניסיון שני, 2.5 נק\')'; }
                if (q.status === 'incorrect') { statusClass = 'status-wrong'; statusText = 'שגוי (0 נק\')'; }

                let correctAnsText = q.type === 'mcq' ? q.options[q.correctAnswer] : q.correctAnswer;

                htmlString += `
                <div class="q-block">
                    <div class="q-text">שאלה ${i + 1}: ${q.text}</div>
                    <div class="${statusClass}">סטטוס: ${statusText}</div>
                    ${q.status !== 'correct_first' && q.status !== 'correct_second' ? `<div style="font-size: 14px; margin-top:4px;"><strong>התשובה הנכונה:</strong> ${correctAnsText}</div>` : ''}
                </div>`;
            });

            htmlString += `
            </body>
            </html>`;

            printWindow.document.write(htmlString);
            printWindow.document.close();
        }
    </script>
</body>
</html>
