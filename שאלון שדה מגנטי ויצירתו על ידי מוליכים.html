                question: "תלמיד מלפף סילונית בעלת שכבה אחת צפופה של כריכות חוט מוליך. לאחר מכן, הוא מוסיף שכבה שנייה צפופה של כריכות בדיוק מעל השכבה הראשונה (באותו כיוון ליפוף). כיצד ישתנה השדה המגנטי בתוך הסילונית כאשר יוזרם בה אותו הזרם?",
                options: [
                    "השדה יגדל פי 4.",
                    "השדה יישאר ללא שינוי (השדות יבטלו זה את זה).",
                    "השדה יקטן לחצי.",
                    "השדה יגדל פי 2."
                ],
                correctIndex: 3,
                rationale: "הוספת שכבה שנייה באותו כיוון ליפוף למעשה מכפילה את מספר הכריכות הכללי ליחידת אורך ($n$ גדל פי 2), בעוד עוצמת הזרם $I$ נשארת קבועה. על פי הנוסחה של שדה בסילונית $B = \\mu_0 n I$, השדה יגדל פי 2."
            },
            {
                question: "שתי כריכות מעגליות מונחות באותו מישור ויש להן מרכז משותף. רדיוס הכריכה החיצונית כפול מזה של הפנימית ($R_{out} = 2R_{in}$). בשתיהן זורם זרם בעוצמה זהה $I$, אך בכיוונים מנוגדים. מה תהיה עוצמת השדה המגנטי במרכזן?",
                options: [
                    "$\\frac{\\mu_0 I}{4 R_{in}}$ בכיוון השדה של הכריכה הפנימית.",
                    "$\\frac{\\mu_0 I}{2 R_{in}}$ בכיוון השדה של הכריכה הפנימית.",
                    "$\\frac{\\mu_0 I}{4 R_{in}}$ בכיוון השדה של הכריכה החיצונית.",
                    "השדה מתאפס לחלוטין."
                ],
                correctIndex: 0,
                rationale: "עוצמת השדה של הכריכה הפנימית: $B_{in} = \\frac{\\mu_0 I}{2R_{in}}$. עוצמת השדה של החיצונית: $B_{out} = \\frac{\\mu_0 I}{2(2R_{in})} = \\frac{\\mu_0 I}{4R_{in}}$. מאחר שהזרמים מנוגדים, השדות מחסרים זה את זה. הכריכה הפנימית יוצרת שדה חזק יותר, ולכן השקול יהיה בכיוונה: $B_{total} = \\frac{\\mu_0 I}{2R_{in}} - \\frac{\\mu_0 I}{4R_{in}} = \\frac{\\mu_0 I}{4R_{in}}$."
            },
            {
                question: "תיל ארוך נושא זרם של $I = 20 \\text{ A}$ ממערב למזרח. הרכיב האופקי של שדה כדור הארץ פונה צפונה ועוצמתו $B_E = 4 \\times 10^{-5} \\text{ T}$. באיזה מרחק מהתיל ובאיזה כיוון, השדה המגנטי השקול מתאפס?",
                options: [
                    "במרחק $0.1 \\text{ m}$ בדיוק מעל התיל.",
                    "במרחק $0.1 \\text{ m}$ בדיוק מתחת לתיל.",
                    "במרחק $0.2 \\text{ m}$ מצפון לתיל.",
                    "במרחק $0.2 \\text{ m}$ מדרום לתיל."
                ],
                correctIndex: 0,
                rationale: "כדי שהשדות יאפסו זה את זה, השדה מהתיל חייב להצביע דרומה (נגד שדה כדור הארץ). מזרם מזרחה, לפי כלל יד ימין, השדה מצביע דרומה בנקודות שמעל התיל. נשווה עוצמות: $\\frac{\\mu_0 I}{2\\pi r} = B_E \\implies r = \\frac{4\\pi \\times 10^{-7} \\cdot 20}{2\\pi \\cdot 4 \\times 10^{-5}} = 0.1 \\text{ m}$ מעל התיל."
            }
        ];

        let quizStarted = false; let studentName = ""; let currentQuestionIndex = 0; let score = 0;
        let selectedAnswer = null; let showRationale = false; const appDiv = document.getElementById('app');

        function getTimestampCode() {
            const now = new Date(); const pad = (n) => n.toString().padStart(2, '0');
            return `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        }

        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="flex items-center justify-center min-h-[70vh] fade-in">
                    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl p-8 text-center space-y-6">
                        <div class="w-20 h-20 mx-auto bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mb-2">
                            <i class="fas fa-graduation-cap text-4xl"></i>
                        </div>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800">אלקטרומגנטיות: שדה וכוח מגנטי</h1>
                        <p class="text-lg text-slate-500 font-medium">פיזיקה י"ב - הכנה לבגרות</p>
                        <div class="mt-8 text-right bg-slate-50 p-6 rounded-xl border border-slate-100">
                            <label class="block text-slate-700 font-bold text-lg mb-3" for="student-name">שם תלמיד/ה (מלא):</label>
                            <input type="text" id="student-name" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 focus:outline-none text-lg transition-colors" placeholder="הכנס שם פרטי ושם משפחה...">
                            <p id="name-error" class="text-red-500 text-sm mt-2 hidden font-medium"><i class="fas fa-exclamation-circle ml-1"></i> אנא הזן שם כדי להתחיל</p>
                        </div>
                        <button onclick="startQuiz()" class="mt-6 flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-xl transition-colors shadow-lg active:scale-95">
                            התחל בוחן <i class="fas fa-arrow-left mt-1"></i>
                        </button>
                    </div>
                </div>
            `;
            setTimeout(() => {
                document.getElementById('student-name').addEventListener('keypress', function (e) { if (e.key === 'Enter') startQuiz(); });
                document.getElementById('student-name').focus();
            }, 100);
        }

        window.startQuiz = function() {
            const nameInput = document.getElementById('student-name').value.trim();
            if (!nameInput) {
                document.getElementById('name-error').classList.remove('hidden');
                document.getElementById('student-name').classList.add('border-red-400');
                return;
            }
            studentName = nameInput; quizStarted = true; render();
        };

        function render() {
            if (!quizStarted) { renderStartScreen(); return; }
            if (currentQuestionIndex >= questions.length) { renderFinished(); return; }

            const q = questions[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / questions.length) * 100;

            let html = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold text-slate-800">אלקטרומגנטיות: שדה וכוח מגנטי</h1>
                        <p class="text-slate-500 mt-1">בהצלחה, ${studentName}!</p>
                    </div>
                    <div class="bg-white px-4 py-2 rounded-lg shadow-sm font-semibold text-blue-600 border border-blue-100">
                        שאלה ${currentQuestionIndex + 1} מתוך ${questions.length}
                    </div>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2.5 mb-8">
                    <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-300 ease-out" style="width: ${progress}%"></div>
                </div>
                <div class="bg-white rounded-2xl shadow-md p-6 md:p-8 mb-6 fade-in">
                    <h2 class="text-xl md:text-2xl font-semibold text-slate-800 mb-6 leading-relaxed">${q.question}</h2>
                    <div class="space-y-3">
            `;

            q.options.forEach((option, index) => {
                let btnClass = "border-slate-200 hover:border-blue-300 hover:bg-blue-50 text-slate-700 cursor-pointer";
                let iconHtml = "";

                if (showRationale) {
                    btnClass = "cursor-default ";
                    if (index === q.correctIndex) {
                        btnClass += "border-green-500 bg-green-50 text-green-800 font-medium shadow-sm";
                        iconHtml = '<i class="fas fa-check-circle text-green-500 text-2xl mr-auto"></i>';
                    } else if (index === selectedAnswer) {
                        btnClass += "border-red-500 bg-red-50 text-red-800";
                        iconHtml = '<i class="fas fa-times-circle text-red-500 text-2xl mr-auto"></i>';
                    } else {
                        btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-60";
                    }
                }

                html += `
                    <button onclick="handleAnswer(${index})" ${showRationale ? 'disabled' : ''} class="w-full text-right p-4 rounded-xl border-2 transition-all flex items-center justify-between gap-4 ${btnClass}">
                        <span class="text-lg leading-relaxed">${option}</span>${iconHtml}
                    </button>
                `;
            });

            html += `</div></div>`;

            if (showRationale) {
                const isCorrect = selectedAnswer === q.correctIndex;
                const rationaleBoxClass = isCorrect ? 'bg-green-50 border-green-200 text-green-900' : 'bg-orange-50 border-orange-200 text-orange-900';
                const rationaleTitle = isCorrect ? '🎯 תשובה נכונה!' : '💡 בואו נבדוק ביחד:';

                html += `
                    <div class="space-y-6 fade-in">
                        <div class="p-6 rounded-2xl border ${rationaleBoxClass}">
                            <h3 class="font-bold text-lg mb-2 flex items-center gap-2">${rationaleTitle}</h3>
                            <p class="text-lg leading-relaxed opacity-90">${q.rationale}</p>
                        </div>
                        <div class="flex justify-end">
                            <button onclick="nextQuestion()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-lg transition-colors shadow-sm hover:shadow-md">
                                ${currentQuestionIndex < questions.length - 1 ? 'לשאלה הבאה' : 'סיום הבוחן'} <i class="fas fa-arrow-left"></i>
                            </button>
                        </div>
                    </div>
                `;
            }
            appDiv.innerHTML = html;
            if (window.MathJax) MathJax.typesetPromise();
        }

        function renderFinished() {
            let message = score >= 18 ? "ציון מעולה! אתה מוכן לחלוטין לחומר בבגרות." : score >= 14 ? "תוצאה טובה מאוד. כדאי לחזור קצת על הטעויות כדי לחדד את ההבנה." : "מומלץ לחזור על הסיכומים ולנסות שוב.";
            const timestampCode = getTimestampCode();

            appDiv.innerHTML = `
                <div class="flex items-center justify-center min-h-[70vh] fade-in">
                    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl p-8 text-center space-y-6">
                        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">כל הכבוד, ${studentName}!</h1>
                        <h2 class="text-xl font-medium text-slate-500 mb-6">סיימת את הבוחן.</h2>
                        <div class="w-40 h-40 mx-auto bg-blue-50 rounded-full flex items-center justify-center border-8 border-blue-100">
                            <div class="text-center">
                                <span class="text-5xl font-black text-blue-600">${score}</span>
                                <span class="text-xl font-bold text-slate-400 block mt-1">מתוך ${questions.length}</span>
                            </div>
                        </div>
                        <p class="text-lg text-slate-600 font-medium">${message}</p>
                        <div class="mt-8 p-5 bg-slate-50 rounded-xl border border-slate-200 shadow-inner">
                            <p class="text-base text-slate-800 mb-3 font-bold">אם אתם מרוצים מהציון צלמו מסך והעלו למשימה</p>
                            <div class="bg-white py-3 px-4 rounded-lg border border-slate-300 inline-block">
                                <p class="text-2xl font-mono font-bold text-slate-800 tracking-widest select-all">${timestampCode}</p>
                            </div>
                            <p class="text-xs text-slate-400 mt-3">הקוד כולל את תאריך ושעת סיום הבוחן לתיעוד.</p>
                        </div>
                        <button onclick="restartQuiz()" class="mt-8 flex items-center justify-center gap-2 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 py-3 rounded-xl font-bold text-lg transition-colors">
                            <i class="fas fa-redo"></i> חזור להתחלה (איפוס)
                        </button>
                    </div>
                </div>
            `;
        }

        window.handleAnswer = function(index) { if (showRationale) return; selectedAnswer = index; showRationale = true; if (index === questions[currentQuestionIndex].correctIndex) score++; render(); };
        window.nextQuestion = function() { currentQuestionIndex++; selectedAnswer = null; showRationale = false; render(); };
        window.restartQuiz = function() { quizStarted = false; studentName = ""; currentQuestionIndex = 0; score = 0; selectedAnswer = null; showRationale = false; render(); };

        render();
    </script>
</body>
</html>
